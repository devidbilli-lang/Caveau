<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caveau — Gestione Prodotto Finito</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d1a;--surface:#13132a;--surface2:#1a1a35;
    --border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#4f46e5;
    --accent-glow:rgba(108,99,255,0.25);--green:#10b981;--green-glow:rgba(16,185,129,0.2);
    --red:#ef4444;--yellow:#f59e0b;--text:#e8e8f0;--text-muted:#6b6b8a;--text-dim:#3d3d5c;
    --c1:#6c63ff;--c2:#10b981;--c3:#f59e0b;--c4:#ef4444;--c5:#06b6d4;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif;}
  body{background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:28px 28px;}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--accent-glow);flex-shrink:0;}
  .brand-name{font-size:26px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#fff;}
  .brand-sub{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .clock{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--accent);background:rgba(108,99,255,0.1);border:1px solid rgba(108,99,255,0.2);padding:8px 18px;border-radius:10px;}
  .conn-pill{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .conn-pill .dot{width:8px;height:8px;border-radius:50%;}
  .conn-pill.wait{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.2);}
  .conn-pill.wait .dot{background:var(--yellow);animation:pulse 1.2s infinite;}
  .conn-pill.ok{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2);}
  .conn-pill.ok .dot{background:var(--green);}
  .conn-pill.err{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
  .conn-pill.err .dot{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .tabs{display:flex;gap:8px;margin-bottom:24px;}
  .tab{padding:11px 24px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);border-radius:10px;transition:all 0.2s;}
  .tab:hover{border-color:rgba(108,99,255,0.3);color:#fff;}
  .tab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 4px 20px var(--accent-glow);}

  .sec{display:none;}.sec.on{display:block;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .alert{font-size:13px;font-weight:600;padding:12px 16px;border-radius:10px;margin-bottom:16px;display:none;text-align:center;}
  .alert.ok{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.25);}
  .alert.err{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
  .alert.inf{background:rgba(108,99,255,0.1);color:#a5b4fc;border:1px solid rgba(108,99,255,0.25);}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;}
  .card-title{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:20px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;}
  .card-title::before,.card-title::after{content:'';flex:1;height:1px;background:var(--border);}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .fg{display:flex;flex-direction:column;gap:7px;}
  .fg.full{grid-column:1/-1;}
  label{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);text-align:center;}
  input[type=date],input[type=number],input[type=text],select,textarea{
    padding:11px 14px;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;font-size:14px;font-weight:500;color:var(--text);
    font-family:'Montserrat',sans-serif;width:100%;transition:border-color 0.2s,box-shadow 0.2s;text-align:center;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  select option{background:#1a1a35;}
  textarea{resize:vertical;min-height:80px;text-align:left;}

  .search-wrap{position:relative;}
  .search-wrap input{padding-right:36px;text-align:left;}
  .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:2px 4px;}
  .clear-btn:hover{color:var(--text);}
  .dropdown-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1e1e3a;border:1px solid rgba(108,99,255,0.3);border-radius:10px;max-height:220px;overflow-y:auto;z-index:100;display:none;}
  .dropdown-list.open{display:block;}
  .dropdown-item{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);transition:background 0.15s;text-align:left;}
  .dropdown-item:hover{background:rgba(108,99,255,0.2);color:#a5b4fc;}
  .dropdown-item mark{background:none;color:var(--accent);font-weight:700;}

  .acts{display:flex;gap:10px;justify-content:center;margin-top:20px;}
  .btn{padding:12px 26px;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all 0.2s;}
  .btn:hover{border-color:rgba(255,255,255,0.15);color:#fff;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;box-shadow:0 4px 20px var(--accent-glow);}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
  .btn-green{background:linear-gradient(135deg,#059669,var(--green));color:#fff;border:none;box-shadow:0 4px 16px var(--green-glow);}
  .btn-green:hover{opacity:0.9;transform:translateY(-1px);}

  /* DASHBOARD */
  .dash-top{display:grid;grid-template-columns:200px 1fr;gap:14px;margin-bottom:18px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 16px;text-align:center;display:flex;flex-direction:column;justify-content:center;}
  .stat-val{font-size:44px;font-weight:900;color:var(--accent);letter-spacing:-2px;}
  .stat-lbl{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:8px;}

  /* STACKED BAR CHART */
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 22px 16px;}
  .chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .chart-title2{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-muted);}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .chart-inner{display:flex;flex-direction:column;gap:10px;max-height:220px;overflow-y:auto;}
  .bar-row{display:grid;grid-template-columns:160px 1fr 50px;align-items:center;gap:12px;}
  .bar-label{font-size:12px;font-weight:600;color:var(--text-muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{background:rgba(255,255,255,0.04);border-radius:6px;height:26px;overflow:hidden;display:flex;}
  .bar-seg{height:100%;transition:width 0.6s ease;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .bar-seg-lbl{font-size:11px;font-weight:800;color:rgba(255,255,255,0.9);white-space:nowrap;pointer-events:none;}
  .bar-val{font-size:13px;font-weight:700;color:#a5b4fc;text-align:right;}

  /* FILTERS */
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .filters input[type=text],.filters input[type=date]{max-width:190px;width:auto;padding:9px 13px;font-size:13px;font-weight:600;text-align:left;}

  /* TABLE */
  .table-wrap{border-radius:12px;overflow:auto;border:1px solid var(--border);width:100%;}
  table{width:100%;border-collapse:collapse;font-size:15px;min-width:600px;}
  thead th{background:rgba(108,99,255,0.15);padding:16px 20px;text-align:center;font-size:12px;font-weight:800;letter-spacing:1.2px;color:#a5b4fc;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
  thead th.th-note{background:rgba(108,99,255,0.25);}
  thead th.th-tot{background:rgba(108,99,255,0.35);}
  .th-sub{font-size:11px;font-weight:500;color:rgba(165,180,252,0.6);display:block;margin-top:4px;text-transform:none;letter-spacing:0;}
  tbody td{padding:15px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);font-weight:500;font-size:15px;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(108,99,255,0.07);}
  .td-zero{color:var(--text-dim);}
  .td-tot{font-weight:800;color:#a5b4fc;background:rgba(108,99,255,0.08);}
  .badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:14px;font-weight:700;background:rgba(108,99,255,0.15);color:#a5b4fc;border:1px solid rgba(108,99,255,0.25);}
  .empty{text-align:center;padding:48px;color:var(--text-dim);font-size:15px;font-weight:600;letter-spacing:1px;}

  @media(max-width:700px){
    .grid{grid-template-columns:1fr;}.fg.full{grid-column:1;}
    .dash-top{grid-template-columns:1fr;}header{flex-direction:column;gap:14px;text-align:center;}
    .bar-row{grid-template-columns:90px 1fr 40px;}
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="11" rx="2" fill="white" opacity="0.92"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <circle cx="12" cy="16.5" r="1.8" fill="#6c63ff"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Caveau</div>
        <div class="brand-sub">Gestione Prodotto Finito</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clk">--:--</div>
      <div class="conn-pill wait" id="conn"><span class="dot"></span><span id="conn-txt">Connessione...</span></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab on" onclick="show('ins')">📦 Inserimento</button>
    <button class="tab" onclick="show('rep')">📊 Riepilogo</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- INSERIMENTO -->
  <div id="s-ins" class="sec on">
    <div class="card">
      <div class="card-title">Nuovo Movimento</div>
      <div class="grid">
        <div class="fg">
          <label>📅 Data</label>
          <input type="date" id="fdata"/>
        </div>
        <div class="fg">
          <label>🏭 Reparto</label>
          <div class="search-wrap">
            <input type="text" id="frep-txt" placeholder="Cerca reparto..." autocomplete="off"
              oninput="filterDrop('rep')" onfocus="openDrop('rep')" onblur="blurDrop('rep')"/>
            <button class="clear-btn" onmousedown="clearSrch('rep')">✕</button>
            <div class="dropdown-list" id="drop-rep"></div>
          </div>
          <input type="hidden" id="frep"/>
        </div>
        <div class="fg">
          <label>📦 Articolo</label>
          <div class="search-wrap">
            <input type="text" id="fart-txt" placeholder="Cerca articolo..." autocomplete="off"
              oninput="filterDrop('art')" onfocus="openDrop('art')" onblur="blurDrop('art')"/>
            <button class="clear-btn" onmousedown="clearSrch('art')">✕</button>
            <div class="dropdown-list" id="drop-art"></div>
          </div>
          <input type="hidden" id="fart"/>
        </div>
        <div class="fg">
          <label>🔢 Quantità</label>
          <input type="number" id="fqta" min="0" placeholder="0"/>
        </div>
        <div class="fg full">
          <label>🏷️ Tipologia Nota</label>
          <select id="fnote"><option value="">— nessuna —</option></select>
        </div>
        <div class="fg full">
          <label>📝 Note Libere</label>
          <textarea id="fnlib" placeholder="Note aggiuntive opzionali..."></textarea>
        </div>
      </div>
      <div class="acts">
        <button class="btn" onclick="resetF()">✕ Pulisci</button>
        <button class="btn btn-primary" onclick="salva()">✓ Salva Movimento</button>
      </div>
    </div>
  </div>

  <!-- RIEPILOGO -->
  <div id="s-rep" class="sec">
    <div class="dash-top">
      <div class="stat-card">
        <div class="stat-val" id="st-tot">—</div>
        <div class="stat-lbl">Totale Pezzi</div>
      </div>
      <div class="chart-card">
        <div class="chart-top">
          <div class="chart-title2">Quantità per Articolo</div>
          <div class="legend" id="legend"></div>
        </div>
        <div class="chart-inner" id="chart-bars">
          <div style="text-align:center;color:var(--text-dim);font-size:13px;padding:20px">Caricamento...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Filtri</div>
      <div class="filters">
        <input type="text" id="r-rep" placeholder="🏭 Reparto..." oninput="filtra()"/>
        <input type="text" id="r-art" placeholder="📦 Articolo..." oninput="filtra()"/>
        <input type="date" id="rda" onchange="filtra()" title="Dal"/>
        <input type="date" id="ral" onchange="filtra()" title="Al"/>
        <button class="btn btn-green" style="padding:9px 18px;font-size:13px" onclick="loadR()">↻ Aggiorna</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="tbl-head"></thead>
          <tbody id="tb"><tr><td class="empty">Caricamento dati...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbwEdjaFi9jcYzzG-w5bfLye4jwOrSmikKSRXghnIUSJo9tvKGCQfyI4OTghVPqo0IdBqA/exec';
var tid=0,allRows=[],rHeaders=[],noteDescMap={},dropData={art:[],rep:[]};
var NOTE_COLORS=['#6c63ff','#10b981','#f59e0b','#ef4444','#06b6d4','#a855f7'];

// Clock
setInterval(function(){
  var n=new Date();
  document.getElementById('clk').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
},1000);

// Data locale CORRETTA — evita bug UTC
function todayLocal(){
  var n=new Date();
  return n.getFullYear()+'-'+(n.getMonth()+1).toString().padStart(2,'0')+'-'+n.getDate().toString().padStart(2,'0');
}

// Formatta data da qualsiasi formato a GG/MM/AAAA
function formatDate(v){
  if(!v)return'';
  var s=String(v);
  // Google Sheets spesso restituisce "Date(2026,3,10)" o "2026-04-10"
  var m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m) return String(m[3]).padStart(2,'0')+'/'+String(parseInt(m[2])+1).padStart(2,'0')+'/'+m[1];
  var p=s.slice(0,10).split('-');
  if(p.length===3&&p[0].length===4) return p[2]+'/'+p[1]+'/'+p[0];
  return s.slice(0,10);
}

document.getElementById('fdata').value=todayLocal();

function setConn(s,t){var e=document.getElementById('conn');e.className='conn-pill '+s;document.getElementById('conn-txt').textContent=t;}

function gp(action,params,cb){
  var fn='_cb'+(tid++);
  var el=document.createElement('script');
  var q=new URLSearchParams(Object.assign({action:action,callback:fn,t:Date.now()},params||{})).toString();
  el.src=BASE+'?'+q;
  window[fn]=function(d){delete window[fn];el.remove();cb(d);};
  el.onerror=function(){delete window[fn];el.remove();cb({ok:false,error:'Script error'});};
  document.head.appendChild(el);
}

function hdr(d){
  if(!d||!d.length)return false;
  return['codice','id','nome','descrizione','reparto','articolo','nota','tipologia','note','data']
    .indexOf(String(d[0][0]||'').toLowerCase())>=0;
}

// DROPDOWN
function buildDrop(type,data,skip){
  dropData[type]=[];
  for(var i=skip?1:0;i<data.length;i++){
    if(!data[i][0])continue;
    dropData[type].push({val:String(data[i][0]),label:data[i][1]?data[i][0]+' — '+data[i][1]:String(data[i][0])});
  }
}
function filterDrop(type){
  var txt=document.getElementById('f'+type+'-txt').value.toLowerCase();
  var list=document.getElementById('drop-'+type);
  var items=dropData[type].filter(function(d){return d.label.toLowerCase().indexOf(txt)>=0;});
  list.innerHTML=items.length?items.map(function(d){
    var safe=txt.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    var hl=d.label.replace(new RegExp('('+safe+')','gi'),'<mark>$1</mark>');
    return '<div class="dropdown-item" onmousedown="selectDrop(\''+type+'\',\''+d.val.replace(/\\/g,'\\\\').replace(/'/g,'\\\'')+'\')">'+ hl+'</div>';
  }).join(''):'<div class="dropdown-item" style="color:var(--text-dim)">Nessun risultato</div>';
  list.classList.add('open');
  document.getElementById('f'+type).value='';
}
function openDrop(type){filterDrop(type);}
function blurDrop(type){setTimeout(function(){document.getElementById('drop-'+type).classList.remove('open');},150);}
function selectDrop(type,val){
  var item=dropData[type].find(function(d){return d.val===val;});
  document.getElementById('f'+type+'-txt').value=item?item.label:val;
  document.getElementById('f'+type).value=val;
  document.getElementById('drop-'+type).classList.remove('open');
}
function clearSrch(type){
  document.getElementById('f'+type+'-txt').value='';
  document.getElementById('f'+type).value='';
  document.getElementById('drop-'+type).classList.remove('open');
}

// NOTE SELECT
function fillNote(data,skip){
  var s=document.getElementById('fnote');
  s.innerHTML='<option value="">— nessuna —</option>';
  noteDescMap={};
  for(var i=skip?1:0;i<data.length;i++){
    if(!data[i][0])continue;
    var cod=String(data[i][0]),desc=data[i][1]?String(data[i][1]):'';
    noteDescMap[cod]=desc;
    var o=document.createElement('option');
    o.value=cod;o.textContent=desc?cod+' — '+desc:cod;
    s.appendChild(o);
  }
}

// INIT
function init(){
  setConn('wait','Connessione...');
  gp('read',{sheet:'Articoli'},function(da){
    var A=da.data||[];
    gp('read',{sheet:'Reparti'},function(dr){
      var R=dr.data||[];
      gp('read',{sheet:'Note'},function(dn){
        var N=dn.data||[];
        buildDrop('art',A,hdr(A));
        buildDrop('rep',R,hdr(R));
        fillNote(N,hdr(N));
        setConn('ok','Connesso');
        showAlert('Connessione riuscita!','ok');
        loadR();
      });
    });
  });
}

// RIEPILOGO
function loadR(){
  document.getElementById('tb').innerHTML='<tr><td class="empty">Caricamento...</td></tr>';
  gp('read_riepilogo',{},function(d){
    if(!d.ok){document.getElementById('tb').innerHTML='<tr><td class="empty">Errore: '+(d.error||'')+'</td></tr>';return;}
    rHeaders=d.headers||[];
    allRows=(d.rows||[]).filter(function(r){return r[0];});
    renderHead();
    filtra();
  });
}

var HIDDEN=['note','note libere','note_libere','codice','notes'];
function isHidden(col){return HIDDEN.indexOf(col.toLowerCase())>=0;}
function getNoteIndices(){
  var r=[];
  for(var i=3;i<rHeaders.length;i++){
    if(rHeaders[i]==='Totale')break;
    if(!isHidden(rHeaders[i]))r.push(i);
  }
  return r;
}

function renderHead(){
  var ni=getNoteIndices(),totIdx=rHeaders.indexOf('Totale');
  var h='<tr><th>Data</th><th>Reparto</th><th>Articolo</th>';
  ni.forEach(function(i){
    var cod=rHeaders[i],desc=noteDescMap[cod]||'';
    h+='<th class="th-note">'+cod+(desc?'<span class="th-sub">'+desc+'</span>':'')+'</th>';
  });
  if(totIdx>=0)h+='<th class="th-tot">Totale</th>';
  h+='</tr>';
  document.getElementById('tbl-head').innerHTML=h;
}

function filtra(){
  var rep=document.getElementById('r-rep').value.toLowerCase();
  var art=document.getElementById('r-art').value.toLowerCase();
  var da=document.getElementById('rda').value;
  var al=document.getElementById('ral').value;
  var totIdx=rHeaders.indexOf('Totale');
  var ni=getNoteIndices();

  var f=allRows.filter(function(r){
    if(rep&&String(r[1]||'').toLowerCase().indexOf(rep)<0)return false;
    if(art&&String(r[2]||'').toLowerCase().indexOf(art)<0)return false;
    var d=formatDate(r[0]);
    // confronto con filtri data (converti GG/MM/AAAA → AAAA-MM-GG per confronto)
    if(da||al){
      var p=d.split('/');
      var iso=p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;
      if(da&&iso<da)return false;
      if(al&&iso>al)return false;
    }
    return true;
  });

  var tot=f.reduce(function(s,r){return s+(parseFloat(totIdx>=0?r[totIdx]:0)||0);},0);
  document.getElementById('st-tot').textContent=tot||'—';

  // STACKED BAR: per ogni articolo, somma per ogni colonna nota
  var artMap={};
  f.forEach(function(r){
    var a=String(r[2]||'');if(!a)return;
    if(!artMap[a])artMap[a]={tot:0,segs:{}};
    ni.forEach(function(i){
      var v=parseFloat(r[i])||0;
      artMap[a].segs[rHeaders[i]]=(artMap[a].segs[rHeaders[i]]||0)+v;
      artMap[a].tot+=v;
    });
  });
  var barData=Object.keys(artMap).map(function(k){return{art:k,tot:artMap[k].tot,segs:artMap[k].segs};});
  barData.sort(function(a,b){return b.tot-a.tot;});
  renderStackedChart(barData,ni);

  // TABELLA
  var tb=document.getElementById('tb');
  if(!f.length){tb.innerHTML='<tr><td colspan="'+(3+ni.length+1)+'" class="empty">Nessun dato trovato</td></tr>';return;}
  tb.innerHTML=f.map(function(r){
    var html='<tr><td>'+formatDate(r[0])+'</td><td>'+String(r[1]||'')+'</td><td>'+String(r[2]||'')+'</td>';
    ni.forEach(function(i){var n=parseFloat(r[i])||0;html+='<td class="'+(n===0?'td-zero':'')+'">'+(n===0?'—':n)+'</td>';});
    if(totIdx>=0){var tv=parseFloat(r[totIdx])||0;html+='<td class="td-tot"><span class="badge">'+tv+'</span></td>';}
    html+='</tr>';return html;
  }).join('');
}

function renderStackedChart(data,ni){
  var el=document.getElementById('chart-bars');
  var lgd=document.getElementById('legend');
  if(!data.length){
    el.innerHTML='<div style="text-align:center;color:var(--text-dim);font-size:13px;padding:20px">Nessun dato</div>';
    lgd.innerHTML='';return;
  }
  var noteNames=ni.map(function(i){return rHeaders[i];});
  var maxTot=data[0].tot||1;

  // Legenda
  lgd.innerHTML=noteNames.map(function(n,i){
    var desc=noteDescMap[n]||n;
    var col=NOTE_COLORS[i%NOTE_COLORS.length];
    return '<div class="legend-item"><div class="legend-dot" style="background:'+col+'"></div>'+desc+'</div>';
  }).join('');

  // Barre
  el.innerHTML=data.map(function(d){
    var pctTot=Math.round((d.tot/maxTot)*100);
    var segs=noteNames.map(function(n,i){
      var v=d.segs[n]||0;
      var pct=d.tot>0?Math.round((v/d.tot)*100):0;
      var col=NOTE_COLORS[i%NOTE_COLORS.length];
      return{pct:pct,col:col,v:v,n:n};
    }).filter(function(s){return s.pct>0;});
    var segHtml=segs.map(function(s,i){
      var radius='';
      if(segs.length===1) radius='border-radius:6px;';
      else if(i===0) radius='border-radius:6px 0 0 6px;';
      else if(i===segs.length-1) radius='border-radius:0 6px 6px 0;';
      var showLbl=s.pct>=8;
      return '<div class="bar-seg" style="width:'+s.pct+'%;background:'+s.col+';'+radius+'" title="'+s.n+': '+s.v+'">'+(showLbl?'<span class="bar-seg-lbl">'+s.v+'</span>':'')+'</div>';
    }).join('');
    return '<div class="bar-row">'+
      '<div class="bar-label" title="'+d.art+'">'+d.art+'</div>'+
      '<div class="bar-track" style="width:'+pctTot+'%">'+segHtml+'</div>'+
      '<div class="bar-val">'+d.tot+'</div>'+
      '</div>';
  }).join('');
}

// SALVA
function salva(){
  var data=document.getElementById('fdata').value;
  var rep=document.getElementById('frep').value;
  var art=document.getElementById('fart').value;
  var qta=document.getElementById('fqta').value;
  var note=document.getElementById('fnote').value;
  var nlib=document.getElementById('fnlib').value;
  if(!data||!rep||!art||!qta||!note){showAlert('Compila tutti i campi obbligatori, inclusa la tipologia nota','err');return;}
  gp('write',{data:data,reparto:rep,articolo:art,quantita:qta,note:note,note_libere:nlib,foglio:'Riepilogo'},function(r){
    if(r.ok){showAlert('✓ Movimento salvato!','ok');resetF();setTimeout(loadR,1500);}
    else{showAlert('Errore: '+(r.error||'sconosciuto'),'err');}
  });
}

function resetF(){
  document.getElementById('fdata').value=todayLocal();
  clearSrch('rep');clearSrch('art');
  document.getElementById('fqta').value='';
  document.getElementById('fnote').value='';
  document.getElementById('fnlib').value='';
}

function showAlert(t,c){
  var e=document.getElementById('alert');
  e.textContent=t;e.className='alert '+c;e.style.display='block';
  setTimeout(function(){e.style.display='none';},5000);
}

function show(n){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('s-'+n).classList.add('on');
  document.querySelectorAll('.tab')[{ins:0,rep:1}[n]].classList.add('on');
  if(n==='rep')loadR();
}

init();
</script>
