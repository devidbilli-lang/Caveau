<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caveau — Gestione Prodotto Finito</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #13132a;
    --surface2: #1a1a35;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #4f46e5;
    --accent-glow: rgba(108,99,255,0.25);
    --green: #10b981;
    --green-glow: rgba(16,185,129,0.2);
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --text-dim: #3d3d5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 0; }

  /* Background grid pattern */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: #fff;
    box-shadow: 0 0 24px var(--accent-glow);
    letter-spacing: -1px;
  }
  .brand-name { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; }
  .brand-sub { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .clock {
    font-size: 20px; font-weight: 800; letter-spacing: 2px;
    color: var(--accent);
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.2);
    padding: 7px 16px; border-radius: 10px;
  }
  .conn-pill {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 6px 14px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.3s;
  }
  .conn-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .conn-pill.wait { background: rgba(245,158,11,0.1); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
  .conn-pill.wait .dot { background: var(--yellow); animation: pulse 1.2s infinite; }
  .conn-pill.ok { background: rgba(16,185,129,0.1); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
  .conn-pill.ok .dot { background: var(--green); }
  .conn-pill.err { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .conn-pill.err .dot { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TABS */
  .tabs { display: flex; gap: 6px; margin-bottom: 24px; }
  .tab {
    padding: 10px 22px; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    border-radius: 10px;
    transition: all 0.2s;
  }
  .tab:hover { border-color: rgba(108,99,255,0.3); color: #fff; }
  .tab.on {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .sec { display: none; }
  .sec.on { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  /* ALERT */
  .alert {
    font-size: 12px; font-weight: 600; padding: 11px 16px;
    border-radius: 10px; margin-bottom: 16px; display: none;
    letter-spacing: 0.3px; text-align: center;
  }
  .alert.ok { background: rgba(16,185,129,0.1); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
  .alert.err { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
  .alert.inf { background: rgba(108,99,255,0.1); color: #a5b4fc; border: 1px solid rgba(108,99,255,0.25); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: 11px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 20px; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .card-title::before, .card-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* FORM */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .fg { display: flex; flex-direction: column; gap: 7px; }
  .fg.full { grid-column: 1/-1; }
  label {
    font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-muted);
    text-align: center;
  }
  input[type=date], input[type=number], input[type=text], select, textarea {
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-weight: 500;
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  select option { background: #1a1a35; }
  textarea { resize: vertical; min-height: 72px; text-align: left; }

  .acts { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  .btn {
    padding: 11px 24px; border-radius: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted);
    transition: all 0.2s;
  }
  .btn:hover { border-color: rgba(255,255,255,0.15); color: #fff; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
  .btn-green {
    background: linear-gradient(135deg, #059669, var(--green));
    color: #fff; border: none;
    box-shadow: 0 4px 16px var(--green-glow);
  }
  .btn-green:hover { opacity: 0.9; transform: translateY(-1px); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 18px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 12px;
    text-align: center;
  }
  .stat-val { font-size: 30px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
  .stat-lbl { font-size: 9px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

  /* FILTERS */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; justify-content: center; }
  .filters select, .filters input[type=date] {
    max-width: 155px; width: auto; padding: 8px 12px;
    font-size: 11px; font-weight: 600;
  }

  /* TABLE */
  .table-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: rgba(108,99,255,0.15);
    padding: 12px 14px; text-align: center;
    font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
    color: #a5b4fc; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 11px 14px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--text); font-weight: 500;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(108,99,255,0.07); }
  tfoot td {
    padding: 11px 14px; text-align: center;
    background: rgba(108,99,255,0.1);
    font-size: 11px; font-weight: 700; color: #fff;
  }
  .badge {
    display: inline-block; padding: 3px 12px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
    background: rgba(108,99,255,0.15); color: #a5b4fc;
    border: 1px solid rgba(108,99,255,0.25);
  }
  .empty { text-align: center; padding: 48px; color: var(--text-dim); font-size: 13px; font-weight: 600; letter-spacing: 1px; }

  /* CONFIG */
  .cfg-note {
    background: rgba(108,99,255,0.07); border: 1px solid rgba(108,99,255,0.15);
    border-radius: 10px; padding: 12px 16px;
    font-size: 11px; font-weight: 500; color: #a5b4fc;
    text-align: center; line-height: 1.7; margin-bottom: 18px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .fg.full { grid-column: 1; }
    .stats { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 14px; text-align: center; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-icon">CV</div>
      <div>
        <div class="brand-name">Caveau</div>
        <div class="brand-sub">Gestione Prodotto Finito</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clk">--:--</div>
      <div class="conn-pill wait" id="conn"><span class="dot"></span><span id="conn-txt">Connessione...</span></div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" onclick="show('ins')">📦 Inserimento</button>
    <button class="tab" onclick="show('rep')">📊 Riepilogo</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- INSERIMENTO -->
  <div id="s-ins" class="sec on">
    <div class="card">
      <div class="card-title">Nuovo Movimento</div>
      <div class="grid">
        <div class="fg"><label>📅 Data</label><input type="date" id="fdata"/></div>
        <div class="fg"><label>🏭 Reparto</label><select id="frep"><option value="">— seleziona —</option></select></div>
        <div class="fg"><label>📦 Articolo</label><select id="fart"><option value="">— seleziona —</option></select></div>
        <div class="fg"><label>🔢 Quantità</label><input type="number" id="fqta" min="0" placeholder="0"/></div>
        <div class="fg full"><label>🏷️ Tipologia Nota</label><select id="fnote"><option value="">— nessuna —</option></select></div>
        <div class="fg full"><label>📝 Note Libere</label><textarea id="fnlib" placeholder="Note aggiuntive opzionali..."></textarea></div>
      </div>
      <div class="acts">
        <button class="btn" onclick="resetF()">✕ Pulisci</button>
        <button class="btn btn-primary" onclick="salva()">✓ Salva Movimento</button>
      </div>
    </div>
  </div>

  <!-- RIEPILOGO -->
  <div id="s-rep" class="sec">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="st-tot">—</div><div class="stat-lbl">Totale Pezzi</div></div>
      <div class="stat"><div class="stat-val" id="st-mov">—</div><div class="stat-lbl">Movimenti</div></div>
      <div class="stat"><div class="stat-val" id="st-art">—</div><div class="stat-lbl">Articoli Distinti</div></div>
    </div>
    <div class="card">
      <div class="card-title">Filtri</div>
      <div class="filters">
        <select id="rrep" onchange="filtra()"><option value="">Tutti i reparti</option></select>
        <select id="rart" onchange="filtra()"><option value="">Tutti gli articoli</option></select>
        <input type="date" id="rda" onchange="filtra()" title="Dal"/>
        <input type="date" id="ral" onchange="filtra()" title="Al"/>
        <button class="btn btn-green" style="padding:8px 16px;font-size:11px" onclick="loadR()">↻ Aggiorna</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Reparto</th><th>Articolo</th><th>Quantità</th><th>Note</th></tr></thead>
          <tbody id="tb"><tr><td colspan="5" class="empty">Caricamento dati...</td></tr></tbody>
          <tfoot id="tf"></tfoot>
        </table>
      </div>
    </div>
  </div>


</div>
<script>
var BASE = 'https://script.google.com/macros/s/AKfycbwn7CluVc0tqfFs1efbAE5DN5OP7kK2KSlz7sd1tHvuiTHQR5tR7Eqne1rD5A8JPV14yw/exec';
var rows = [];
var cfg = { a:'Articoli', r:'Reparti', n:'Note', s:'Riepilogo' };
var tid = 0;

setInterval(function(){
  var n = new Date();
  document.getElementById('clk').textContent =
    n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}, 1000);

document.getElementById('fdata').value = new Date().toISOString().slice(0,10);

function setConn(state, txt) {
  var el = document.getElementById('conn');
  el.className = 'conn-pill ' + state;
  document.getElementById('conn-txt').textContent = txt;
}

function gp(sheet, cb) {
  var fn = '_cb' + (tid++);
  var el = document.createElement('script');
  el.src = BASE + '?action=read&sheet=' + encodeURIComponent(sheet) + '&callback=' + fn + '&t=' + Date.now();
  window[fn] = function(d){ delete window[fn]; el.remove(); cb(d); };
  el.onerror = function(){ delete window[fn]; el.remove(); cb({ok:false,error:'Script error'}); };
  document.head.appendChild(el);
}

function wp(p, cb) {
  var fn = '_cb' + (tid++);
  var el = document.createElement('script');
  var q = new URLSearchParams(p).toString();
  el.src = BASE + '?action=write&' + q + '&callback=' + fn + '&t=' + Date.now();
  window[fn] = function(d){ delete window[fn]; el.remove(); cb(d); };
  el.onerror = function(){ delete window[fn]; el.remove(); cb({ok:false,error:'Script error'}); };
  document.head.appendChild(el);
}

function hdr(d){
  if(!d||!d.length) return false;
  return ['codice','id','nome','descrizione','reparto','articolo','nota','tipologia','note','data']
    .indexOf(String(d[0][0]||'').toLowerCase()) >= 0;
}

function fsel(id, data, sk, allLabel) {
  var s = document.getElementById(id);
  var ph = allLabel || s.options[0].text;
  s.innerHTML = '<option value="">' + ph + '</option>';
  for(var i = sk?1:0; i < data.length; i++){
    if(!data[i][0]) continue;
    var o = document.createElement('option');
    o.value = String(data[i][0]);
    o.textContent = data[i][1] ? data[i][0] + ' — ' + data[i][1] : String(data[i][0]);
    s.appendChild(o);
  }
}

function init() {
  if(!BASE){ setConn('err','URL mancante'); return; }
  setConn('wait','Connessione...');
  gp(cfg.a, function(da){
    var A = da.data||[];
    gp(cfg.r, function(dr){
      var R = dr.data||[];
      gp(cfg.n, function(dn){
        var N = dn.data||[];
        var sA=hdr(A), sR=hdr(R), sN=hdr(N);
        fsel('fart',A,sA); fsel('frep',R,sR);
        var sn = document.getElementById('fnote');
        sn.innerHTML = '<option value="">— nessuna —</option>';
        for(var i=sN?1:0;i<N.length;i++){
          if(!N[i][0]) continue;
          var o=document.createElement('option');
          o.value=String(N[i][0]);
          o.textContent=N[i][1] ? N[i][0]+' — '+N[i][1] : String(N[i][0]);
          sn.appendChild(o);
        }
        fsel('rart',A,sA,'Tutti gli articoli');
        fsel('rrep',R,sR,'Tutti i reparti');
        setConn('ok','Connesso');
        showAlert('Connessione riuscita!','ok');
        loadR();
      });
    });
  });
}

function loadR(){
  document.getElementById('tb').innerHTML = '<tr><td colspan="5" class="empty">Caricamento...</td></tr>';
  gp(cfg.s, function(d){
    var data=d.data||[], sk=hdr(data);
    rows = (sk?data.slice(1):data).filter(function(r){return r[0];});
    filtra();
  });
}

function filtra(){
  var re=document.getElementById('rrep').value;
  var ar=document.getElementById('rart').value;
  var da=document.getElementById('rda').value;
  var al=document.getElementById('ral').value;
  var f=rows.filter(function(r){
    if(re&&String(r[1])!==re) return false;
    if(ar&&String(r[2])!==ar) return false;
    var d=String(r[0]).slice(0,10);
    if(da&&d<da) return false;
    if(al&&d>al) return false;
    return true;
  });
  var tot=f.reduce(function(s,r){return s+(parseFloat(r[3])||0);},0);
  var arts=new Set(f.map(function(r){return r[2];}));
  document.getElementById('st-tot').textContent = tot;
  document.getElementById('st-mov').textContent = f.length;
  document.getElementById('st-art').textContent = arts.size;
  var tb=document.getElementById('tb'), tf=document.getElementById('tf');
  if(!f.length){
    tb.innerHTML='<tr><td colspan="5" class="empty">Nessun dato trovato</td></tr>';
    tf.innerHTML=''; return;
  }
  tb.innerHTML=f.map(function(r){
    return '<tr><td>'+String(r[0]).slice(0,10)+'</td><td>'+(r[1]||'')+'</td><td>'+(r[2]||'')+'</td><td><span class="badge">'+(r[3]||0)+'</span></td><td style="color:#6b6b8a;font-size:11px">'+[r[4],r[5]].filter(Boolean).join(' — ')+'</td></tr>';
  }).join('');
  tf.innerHTML='<tr><td colspan="3" style="font-size:11px;letter-spacing:1px">TOTALE ('+f.length+' movimenti)</td><td><span class="badge">'+tot+'</span></td><td></td></tr>';
}

function salva(){
  var d=document.getElementById('fdata').value;
  var re=document.getElementById('frep').value;
  var ar=document.getElementById('fart').value;
  var qt=document.getElementById('fqta').value;
  var no=document.getElementById('fnote').value;
  var nl=document.getElementById('fnlib').value;
  if(!d||!re||!ar||!qt){showAlert('Compila tutti i campi obbligatori','err');return;}
  wp({data:d,reparto:re,articolo:ar,quantita:qt,note:no,note_libere:nl,foglio:cfg.s},function(r){
    if(r.ok){showAlert('✓ Movimento salvato con successo!','ok');resetF();setTimeout(loadR,1500);}
    else{showAlert('Errore: '+(r.error||'sconosciuto'),'err');}
  });
}

function resetF(){
  ['frep','fart','fqta','fnote','fnlib'].forEach(function(i){document.getElementById(i).value='';});
}

function showAlert(t,c){
  var e=document.getElementById('alert');
  e.textContent=t; e.className='alert '+c; e.style.display='block';
  setTimeout(function(){e.style.display='none';},5000);
}

function show(n){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('s-'+n).classList.add('on');
  var m={ins:0,rep:1};
  document.querySelectorAll('.tab')[m[n]].classList.add('on');
  if(n==='rep'&&!rows.length) loadR();
}

init();
</script>
</body>
</html>
