function giorniLavorativiJS(tsInizio) {
  if(!tsInizio) return 1;
  var cur = new Date(tsInizio); cur.setHours(0,0,0,0);
  var oggi = new Date(); oggi.setHours(0,0,0,0);

    if(dow !== 0 && dow !== 6) gg++;
    cur.setDate(cur.getDate()+1);
  }

  if(m) return new Date(m[3],m[2]-1,m[1],m[4],m[5],m[6]||0);

async function fetchConRetry(url, tentativi=8, delayMs=800) {
  for (let i = 0; i < tentativi; i++) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 25000);
      const r = await fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(tid));
      if (r.ok) return r;
    } catch(e) {
      if (i < tentativi - 1) {
        await new Promise(res => setTimeout(res, delayMs * (i + 1)));
      }
    }
  }
  throw new Error('Richiesta fallita dopo ' + tentativi + ' tentativi');
}
// ─── CODA LOCALE EVENTI ──────────────────────────────────────────────────────
const CODA_KEY = "nexus_coda_eventi";
let _codaAttiva = false;

function codaChiave(p) {
  const giorno = new Date().toISOString().slice(0,10);
  // CORSO e RIENTRO possono avvenire più volte — aggiungi timestamp per renderli unici
  const tipiMultipli = ["CORSO","RIENTRO"];
  const extra = tipiMultipli.includes((p.tipo||"").toUpperCase()) ? "|"+Date.now() : "";
  return (p.matricola||"")+"|"+(p.sku||"")+"|"+(p.tipo||"")+"|"+(p.lineaDa||"")+"|"+giorno+extra;
}

function codaAggiungi(evento) {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    const chiave = codaChiave(evento);
    if(coda.find(e=>e.chiave===chiave)) return; // già in coda
    coda.push({...evento, chiave, ts:Date.now(), tentativi:0});
    localStorage.setItem(CODA_KEY,JSON.stringify(coda));
  } catch(e) {}
}

function codaRimuovi(chiave) {
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    localStorage.setItem(CODA_KEY,JSON.stringify(coda.filter(e=>e.chiave!==chiave)));
  } catch(e) {}
}

async function inviaEvento(p) {
  const url = nexusUrl("evento",{sessionId:p.sessionId||"",matricola:p.matricola||"",nome:p.nome||"",cognome:p.cognome||"",sku:p.sku||"",tipo:p.tipo||"",lineaDa:p.lineaDa||"",lineaA:p.lineaA||"",skuDa:p.skuDa||"",skuA:p.skuA||""});
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(),12000);
  const r = await fetch(url,{mode:"cors",signal:ctrl.signal}).finally(()=>clearTimeout(tid));
  if(r&&r.ok){
    return true;
  }
  return false;
}

async function codaProcessa() {
  if(_codaAttiva) return;
  _codaAttiva = true;
  try {
    const coda = JSON.parse(localStorage.getItem(CODA_KEY)||"[]");
    if(!coda.length){ _codaAttiva=false; return; }
    console.log("[CODA] "+coda.length+" eventi in sospeso...");
    const nuova = [];
    for(const ev of coda){
      try {
        const ok = await inviaEvento(ev);
        if(ok){
          console.log("[CODA] ✓", ev.chiave);
        } else {
          ev.tentativi++;
          nuova.push(ev);
          await new Promise(r=>setTimeout(r,1000));
        }
      } catch(e){
        ev.tentativi++;
        nuova.push(ev);
        await new Promise(r=>setTimeout(r,2000));
      }
      await new Promise(r=>setTimeout(r,300));
    }
    localStorage.setItem(CODA_KEY,JSON.stringify(nuova));
    if(nuova.length) console.warn("[CODA] ⚠ "+nuova.length+" ancora in sospeso");
  } catch(e) {}
  _codaAttiva = false;
}

// TimePicker custom: 2 input HH/MM in stile Montserrat viola chiaro.
// Props: value (string "HH:MM"), onChange (callback con nuovo "HH:MM"), size (compact|normal)
function TimePicker({ value, onChange, size }) {
  const [h, m] = (value||"").split(":");
  const hh = h||"00";
  const mm = m||"00";
  const compact = size === "compact";
  const inputW = compact ? 56 : 80;
  const fontS = compact ? 16 : 24;
  const padV = compact ? 6 : 10;
  const update = (newHh, newMm) => { if(onChange) onChange(newHh+":"+newMm); };
  const onChangeH = e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,2);
    if(v!==""){ const n = Math.min(23,Math.max(0,parseInt(v,10))); v = String(n).padStart(v.length>=2?2:1,"0"); }
    update(v, mm);
  };
  const onBlurH = e => { const v=e.target.value; const nv = v===""?"00":String(Math.min(23,Math.max(0,parseInt(v,10)||0))).padStart(2,"0"); update(nv, mm); };
  const onChangeM = e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,2);
    if(v!==""){ const n = Math.min(59,Math.max(0,parseInt(v,10))); v = String(n).padStart(v.length>=2?2:1,"0"); }
    update(hh, v);
  };
  const onBlurM = e => { const v=e.target.value; const nv = v===""?"00":String(Math.min(59,Math.max(0,parseInt(v,10)||0))).padStart(2,"0"); update(hh, nv); };
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:compact?4:8,fontFamily:"'Montserrat',sans-serif"}}>
      <input type="number" min="0" max="23" inputMode="numeric"
        style={{width:inputW,textAlign:"center",fontSize:fontS,fontWeight:800,padding:padV+"px 4px",background:"#f8fafc",border:"1.5px solid #a78bfa",borderRadius:8,color:"#1e293b",fontFamily:"'Montserrat',sans-serif",outline:"none"}}
        value={hh} onChange={onChangeH} onBlur={onBlurH} onFocus={e=>e.target.select()} placeholder="HH"/>
      <span style={{fontSize:compact?20:28,fontWeight:800,color:"#7c3aed"}}>:</span>
      <input type="number" min="0" max="59" inputMode="numeric"
        style={{width:inputW,textAlign:"center",fontSize:fontS,fontWeight:800,padding:padV+"px 4px",background:"#f8fafc",border:"1.5px solid #a78bfa",borderRadius:8,color:"#1e293b",fontFamily:"'Montserrat',sans-serif",outline:"none"}}
        value={mm} onChange={onChangeM} onBlur={onBlurM} onFocus={e=>e.target.select()} placeholder="MM"/>
    </div>
  );
}
// DatePicker custom: 3 input GG/MM/AAAA in stile Montserrat viola chiaro.
// Props: value (string "YYYY-MM-DD"), onChange (callback con nuovo "YYYY-MM-DD"), size
// Verifica che una stringa "YYYY-MM-DD" rappresenti una data valida del calendario
// e sia entro un range ragionevole (±1 anno da oggi).
// Ritorna {valida:boolean, messaggio:string}
function dataValida(str) {
  if (!str || !/^\d{4}-\d{2}-\d{2}$/.test(str)) return {valida:false, messaggio:"Data non valida (GG/MM/AAAA)"};
  const [y,m,g] = str.split("-").map(n=>parseInt(n,10));
  if (m<1||m>12) return {valida:false, messaggio:"Mese non valido (1-12)"};
  if (g<1||g>31) return {valida:false, messaggio:"Giorno non valido (1-31)"};
  // Controllo giorno-mese reale (es. 31/02 non valido)
  const d = new Date(y, m-1, g);
  if (d.getFullYear()!==y || d.getMonth()!==m-1 || d.getDate()!==g) {
    return {valida:false, messaggio:`Il ${g}/${m}/${y} non esiste`};
  }
  // Range ±1 anno da oggi
  const oggi = new Date();
  const limiteMin = new Date(oggi.getFullYear()-1, oggi.getMonth(), oggi.getDate());
  const limiteMax = new Date(oggi.getFullYear()+1, oggi.getMonth(), oggi.getDate());
  if (d < limiteMin) return {valida:false, messaggio:"Data troppo nel passato (max 1 anno fa)"};
  if (d > limiteMax) return {valida:false, messaggio:"Data troppo nel futuro (max 1 anno avanti)"};
  return {valida:true, messaggio:""};
}

  const padV = compact ? 6 : 10;
  const emitChange = (nGg, nMo, nYy) => {
    if (onChange && nGg && nMo && nYy && nYy.length===4) {
      onChange(nYy+"-"+nMo+"-"+nGg);
    }
  };
  // Durante l'editing: accetta cifre, non normalizza (per non rompere la digitazione)
  const onChangeG = e => { const nv = e.target.value.replace(/\D/g,"").slice(0,2); setGgL(nv); };
  const onChangeM = e => { const nv = e.target.value.replace(/\D/g,"").slice(0,2); setMoL(nv); };
  const onChangeY = e => { const nv = e.target.value.replace(/\D/g,"").slice(0,4); setYyL(nv); };
  // Al blur: normalizza con padding e clamp ai limiti
  const onBlurG = () => {
    let n = parseInt(ggL,10);
    if (isNaN(n)||n<1) n=1; if (n>31) n=31;
    const fin = String(n).padStart(2,"0");
    setGgL(fin); emitChange(fin, moL.padStart(2,"0"), yyL);
  };
  const onBlurM = () => {
    let n = parseInt(moL,10);
    if (isNaN(n)||n<1) n=1; if (n>12) n=12;
    const fin = String(n).padStart(2,"0");
    setMoL(fin); emitChange(ggL.padStart(2,"0"), fin, yyL);
  };
  const onBlurY = () => {
    let n = parseInt(yyL,10);
    if (isNaN(n)||n<2020||n>2099) n = new Date().getFullYear();
    const fin = String(n);
    setYyL(fin); emitChange(ggL.padStart(2,"0"), moL.padStart(2,"0"), fin);
  };
  const inpStyle = { textAlign:"center", fontSize:fontS, fontWeight:800, padding:padV+"px 4px", background:"#f8fafc", border:"1.5px solid #a78bfa", borderRadius:8, color:"#1e293b", fontFamily:"'Montserrat',sans-serif", outline:"none" };
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:compact?4:6,fontFamily:"'Montserrat',sans-serif"}}>
      <input type="text" inputMode="numeric" maxLength={2}
        style={{...inpStyle, width:wGG}}
        value={ggL} onChange={onChangeG} onBlur={onBlurG} onFocus={e=>e.target.select()} placeholder="GG"/>
      <span style={{fontSize:compact?18:22,fontWeight:800,color:"#7c3aed"}}>/</span>
      <input type="text" inputMode="numeric" maxLength={2}
        style={{...inpStyle, width:wGG}}
        value={moL} onChange={onChangeM} onBlur={onBlurM} onFocus={e=>e.target.select()} placeholder="MM"/>
      <span style={{fontSize:compact?18:22,fontWeight:800,color:"#7c3aed"}}>/</span>
      <input type="text" inputMode="numeric" maxLength={4}
        style={{...inpStyle, width:wAA}}
        value={yyL} onChange={onChangeY} onBlur={onBlurY} onFocus={e=>e.target.select()} placeholder="AAAA"/>
    </div>
  );
}

function ObiettivoProduzione({ sessioni, lineaId, skuList, borseOggi, borseKO, borseMigl, maxOpOggi, coloreLinea, qualitaPerSku={}, linee=[] }) {

    else if(!v){ setPausaInizioRaw(null); try{ localStorage.removeItem(pausaKey+"_ts"); }catch{} }
  };

  React.useEffect(()=>{
    fetchConRetry(nexusUrl("leggistraordinario",{lineaId}), 3, 1000)
      .then(r=>r.json()).then(j=>{ if(j.ok&&j.data.oreExtra!=null){ setOreExtraRaw(j.data.oreExtra); } }).catch(()=>{});
  },[lineaId]);
  const setOreExtra = v => {
    setOreExtraRaw(v);
    // Salva solo su Sheets, non su localStorage
    fetchConRetry(nexusUrl("salvastraordinario",{lineaId,oreExtra:v}), 3, 1000).catch(()=>{});
  };
  const oreTotali = 8 + (oreExtra||0);
  React.useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),1000); return()=>clearInterval(t); },[]);

    // Checkout automatico quando il turno finisce
  const [turnoChiuso, setTurnoChiuso] = React.useState(false);
  React.useEffect(()=>{
    if(turnoChiuso) return;
    if(!_primoCheckinTs) return;
    const secOraAttuale = new Date().getHours()*3600+new Date().getMinutes()*60+new Date().getSeconds();
    if(secOraAttuale < secFineTurnoAssoluto) return;
    // Turno scaduto → chiudi tutti gli operatori attivi
    const sessAttiveLinea = sessioni.filter(s=>
      s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null||s.fine==="null")
    );
    if(sessAttiveLinea.length===0) return;
    setTurnoChiuso(true);
    (async()=>{
      const checkoutOp = async(s)=>{
        const url = nexusUrl("evento",{sessionId:s.id||s.sessionId||"",matricola:s.matricola||"",nome:s.nome||"",cognome:s.cognome||"",sku:s.skuCorrente||s.sku||"",tipo:"CHECKOUT",lineaDa:s.lineaCorrente||"",lineaA:"",skuDa:s.skuCorrente||s.sku||"",skuA:""});
        for(let i=0;i<3;i++){
          try{ await fetchConRetry(url,5,1000); return {ok:true}; }catch(e){ if(i<2) await new Promise(r=>setTimeout(r,2000*(i+1))); }
        }
        return {ok:false,s};
      };
      const results = await Promise.all(sessAttiveLinea.map(s=>checkoutOp(s)));
      const falliti = results.filter(r=>!r.ok);
      if(falliti.length>0){
        for(const {s} of falliti){ await checkoutOp(s); }
      }
    })();
  },[tick, turnoChiuso, secFineTurnoAssoluto, _primoCheckinTs]);
  // Calcola primo check-in reale della linea
  const _primoCheckinTs = (()=>{
    const ts = sessioni
      .filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&(s.inizio||s.tsInizio))
      .map(s=>{
        // Se trasferito su questa linea, usa l'orario del trasferimento non il check-in originale
        if(s.lineaInizio!==lineaId&&s.trasferimenti&&s.trasferimenti.length>0){

  const _primoCheckinDate = _primoCheckinTs ? new Date(_primoCheckinTs) : null;

  const _oreInizio = _secInizioTurno / 3600;

  const sessAttiveUniche = Object.values(sessAttivePerMat).map(x=>x.s);
  const nOp = sessAttiveUniche.length;
  const skuCount={};

  const skuPiu=Object.entries(skuCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||"";
  // Conta operatori in riparazione separatamente

  const nOpProduzione=nOp-nRiparazione-nCorso;
  const skuObj=skuList.find(s=>s.sku===skuPiu);
  const tc=skuObj?.tc||0;
  // Fine turno = primo check-in della linea + (8h + straordinario)
  const secFineTurno = secFineTurnoAssoluto;

  // Obiettivo finale = Σ per ogni operatore: floor(ore_disponibili × 60/tc)
  // ore_disponibili = fine turno - check-in operatore
  // OBIETTIVO: turno 8h + straordinario per ogni operatore
  // Si scala solo per: corso, riparazione, trasferimento ad altra linea
  // NON scende per uscite anticipate o entrate tardive
  const obFinale = tc>0 ? (()=>{
    const sessioniLinea = sessioni.filter(s=>

    // Per ogni matricola: calcola minuti disponibili meno periodi improduttivi
    const minPerMat = {};

    sessioniLinea.forEach(s=>{
      const mat = s.matricola||s.nome||s.id;
      if(!mat) return;
      const dInizio = parseData(s.inizio);
      if(!dInizio) return;
      const sku = s.skuCorrente||s.sku||"";
      const attiva = !s.fine||s.fine===""||s.fine===null||s.fine==="null";

      // - se ancora in turno → fino a fine turno teorico

      let secIng = dInizio.getHours()*3600+dInizio.getMinutes()*60;

      const dFine = attiva ? null : parseData(s.fine);
      const secFineEff = (attiva||!dFine)

      const minBase = Math.max(0,(secFineEff-secIng)/60);

      if(!minPerMat[mat]) minPerMat[mat]={base:minBase, sottrai:0, contato:false};

      }
      minPerMat[mat].contato = true;

      if(isSkuSpeciale(sku)){
        const secFineRip = attiva ? secFineTurno : (()=>{
          const dF = parseData(s.fine);
          return dF ? Math.min(dF.getHours()*3600+dF.getMinutes()*60, secFineTurno) : secFineTurno;
        })();

      }

      // Scala per trasferimento verso altra linea
      // - sessione chiusa con lineaCorrente diversa → era qui, poi trasferito via
      // - sessione attiva con lineaCorrente diversa → è già su altra linea, escludi completamente
      if(s.lineaCorrente!==lineaId){

          minPerMat[mat].sottrai += Math.max(0,(secFineTurno-secFineLinea)/60);

          if(c.rientro){ const dR=parseData(c.rientro); secCorsoOut=dR?dR.getHours()*3600+dR.getMinutes()*60:secFineTurno; }
          else { secCorsoOut = secFineTurno; }
          minPerMat[mat].sottrai += Math.max(0,(secCorsoOut-secCorsoIn)/60);

    Object.values(minPerMat).forEach(({base,sottrai})=>{
      minTotali += Math.max(0, base-sottrai);
    });
    const tot = minTotali>0 ? Math.ceil(minTotali/tc) : 0;
    return tot>0?tot:null;
  })() : null;
  const ob60 = obFinale!=null&&oreTotali>0 ? Math.round(obFinale/oreTotali) : null;
  // Efficienza = (borse prodotte * TC) / minuti lavorati * 100
  const efficienzaPct = (()=>{
    const borseTot = borseOggi||0;
    if(borseTot===0||tc<=0) return null;
    // Minuti lavorati = somma minuti effettivi di tutti gli operatori finora
    const sessLinea = sessioni.filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio);
    const now3 = new Date();
    const secNow = now3.getHours()*3600+now3.getMinutes()*60+now3.getSeconds();
    let minLavorati = 0;
    const matVisti = new Set();
    sessLinea.forEach(s=>{
      const mat = s.matricola||s.nome||s.id; if(!mat||matVisti.has(mat)) return;
      if(isSkuSpeciale(s.skuCorrente||s.sku||"")) return;
      matVisti.add(mat);
      const dI = parseData(s.inizio); if(!dI) return;
      const secI = dI.getHours()*3600+dI.getMinutes()*60;
      const attiva = !s.fine||s.fine===""||s.fine===null||s.fine==="null";
      const secF = attiva ? Math.min(secNow, secFineTurno) : (()=>{ const dF=parseData(s.fine); return dF?Math.min(dF.getHours()*3600+dF.getMinutes()*60,secFineTurno):secFineTurno; })();
      minLavorati += Math.max(0,(secF-secI)/60);
    });
    if(minLavorati<=0) return null;
    return Math.round((borseTot*tc)/minLavorati*100);
  })();
  const ob60Reale = tc>0&&nOpProduzione>0 ? Math.floor(nOpProduzione*(60/tc)) : null;

  // OBIETTIVO FISSO: max persone uniche registrate oggi × ore turno / TC
  const obiettivoFisso = tc>0 ? (()=>{
    const sessioniLinea = sessioni.filter(s=>
      (s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio&&!s._pianificato
    );
    // Matricole uniche che hanno lavorato su produzione (escluse riparazioni)
    const matricoleUniche = new Set();
    sessioniLinea.forEach(s=>{
      const mat = s.matricola||s.nome||s.id;
      if(!mat) return;
      const sku = s.skuCorrente||s.sku||"";
      if(isSkuSpeciale(sku)) return;
      matricoleUniche.add(mat);
    });
    const nOpMax = matricoleUniche.size;
    if(nOpMax===0) return null;
    const minTotali = nOpMax * oreTotali * 60;
    return Math.ceil(minTotali / tc);
  })() : null;
  const borse=borseOggi||0;
  const ko=borseKO||0;
  const migl=borseMigl||0;
  const pctQualita = borse>0 ? Math.round((borse-ko-migl)/borse*100) : null;
  const colQualita = pctQualita===null?"#94a3b8":pctQualita>=95?"#22c55e":pctQualita>=85?"#f59e0b":"#ef4444";
  const colBorse=ob60&&borse>=ob60?"#22c55e":ob60&&borse>=ob60*0.8?"#f59e0b":"#ef4444";

  if(nOp===0) return (
    <div style={{textAlign:"center",padding:"32px 16px",color:"#94a3b8"}}>

  );

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:"rgba(255,255,255,0.08)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:"1px solid rgba(167,139,250,0.8)",borderRadius:10,padding:"10px 14px",boxShadow:"0 8px 32px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(124,58,237,0.2)"}}>

      </div>

            {/* LAYOUT: colonna sinistra 3 card alte | colonna destra articoli */}

            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>

        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8,minHeight:0}}>

            // Font e padding dinamici in base al numero di RIGHE (coppie)

            const fBig   = nRighe<=1?"clamp(44px,7vw,88px)":nRighe<=2?"clamp(28px,4.5vw,56px)":"clamp(18px,3vw,36px)";

              const obFinaleItem = tcItem>0 ? (()=>{

                    minPerMat[mat].sottrai+=Math.max(0,(eC-sC)/60)/nSim;

function aggiungiGiorniLavorativi(dataInizio, giorni) {
  var d = new Date(dataInizio);
  var aggiunti = 0;
  while (aggiunti < giorni) {
    d.setDate(d.getDate() + 1);
    var gg = d.getDay();
    if (gg !== 0 && gg !== 6) aggiunti++; // salta sab e dom
  }
  return d;
}

function RiepSku({ sessioni, linee, rampeSheets, skuList }) { const [tick,setTick] = useState(0);
  const [riepilogo, setRiepilogo] = useState([]);
  const [modRampa, setModRampa] = useState(null); // {sku, lineaId, dataAttuale, dataNuova, err}
  const [confElimRampa, setConfElimRampa] = useState(null); // {sku, lineaId} per conferma eliminazione
  const [refreshKey, setRefreshKey] = useState(0);
  const [nOpOverride, setNOpOverride] = useState({}); // {sku: numero personalizzato} per scenari "what-if"
  const [filtroStato, setFiltroStato] = useState("attive"); // attive | completate | tutte
  const [filtroDataDa, setFiltroDataDa] = useState("");
  const [filtroDataA, setFiltroDataA] = useState("");
  const [cercaSku, setCercaSku] = useState("");
  useEffect(()=>{
    // Carica riepilogo da Apps Script per dati storici borse prodotte
    fetch(nexusUrl("leggiRiepilogo",{})).then(r=>r.json()).then(j=>{
      if(j.ok&&j.data&&j.data.righe) setRiepilogo(j.data.righe);
    }).catch(()=>{});
  },[]);
  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),60000);return()=>clearInterval(t);},[]);
  const rampaMap = {};
  // Leggi rampe da rampeSheets (tabella rampe del DB). Il campo è `dal`, supporto anche legacy `rampaDal`.
  for(const r of (rampeSheets||[])){
    const dal = r.dal || r.rampaDal;
    if(r.sku && dal){
      const g = giorniLavorativiJS(dal);
      // Se più record per stesso SKU, prendi quello con data più recente (rampa più recente)
      if(!rampaMap[r.sku] || dal > rampaMap[r.sku].dal) {
        rampaMap[r.sku] = { dal, giorni:g, lineaId:r.linea_id || r.lineaId, completata: !!r.completata };
      }
    }
  }
  // Estrai rampe anche dalle sessioni attuali (per SKU che potrebbero non essere ancora in rampeSheets)
  for(const s of sessioni){ let rdal = s.rampaDal||null;
    if(!rdal && (s.skuA||"").includes("__RAMPA__")){ const p=(s.skuA||"").split("__RAMPA__"); const d=new Date(p[1]); if(!isNaN(d)) rdal=d.getTime(); }
    if(rdal){ const sku=s.skuCorrente||s.sku||""; if(sku&&!rampaMap[sku]){ const g=giorniLavorativiJS(rdal); rampaMap[sku]={dal:rdal,giorni:g,lineaId:s.lineaCorrente,completata:false}; } } }
  const totMap={}, linMap={};
  for(const s of sessioni){ for(const {linea,sku,ms} of tappe(s)){ if(!sku||!ms||isNaN(ms)) continue; totMap[sku]=(totMap[sku]||0)+ms; if(!linMap[sku])linMap[sku]={}; linMap[sku][linea]=(linMap[sku][linea]||0)+ms; } }
  // Filtri storici: stato (attive/completate/tutte), range date, ricerca SKU
  const fDataDaTs = filtroDataDa ? (()=>{ const [y,m,g]=filtroDataDa.split("-").map(n=>parseInt(n,10)); return new Date(y,m-1,g,0,0,0,0).getTime(); })() : null;
  const fDataATs = filtroDataA ? (()=>{ const [y,m,g]=filtroDataA.split("-").map(n=>parseInt(n,10)); return new Date(y,m-1,g,23,59,59,999).getTime(); })() : null;
  const queryCerca = (cercaSku||"").trim().toUpperCase();
  const tuttiSku = Object.keys(rampaMap)
    .filter(sku => {
      const r = rampaMap[sku];
      if(!r) return false;
      const isCompletata = r.completata || (r.giorni||0) >= 15;
      // Filtro stato
      if(filtroStato === "attive" && isCompletata) return false;
      if(filtroStato === "completate" && !isCompletata) return false;
      // Filtro date
      if(fDataDaTs && r.dal < fDataDaTs) return false;
      if(fDataATs && r.dal > fDataATs) return false;
      // Filtro ricerca SKU
      if(queryCerca && !sku.toUpperCase().includes(queryCerca)) return false;
      return true;
    })
    .sort((a,b) => (rampaMap[b].dal||0) - (rampaMap[a].dal||0)); // ordina per data più recente prima
  // Costruisco la barra dei filtri come componente riusabile in entrambi i return (vuoto + con risultati)
  const BarraFiltri = (

          .filter(s=>s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null||s.fine==="null")&&s.skuCorrente&&!isSkuSpeciale(s.skuCorrente))
          .map(s=>s.skuCorrente||s.sku));

          .filter(s=>(s.lineaCorrente===lineaId||s.lineaInizio===lineaId)&&s.inizio)
          .map(s=>{ const d=parseData(s.inizio); return d?d.getHours()*3600+d.getMinutes()*60:null; })
          .filter(Boolean);

        const oreTotali = 8; // turno standard
        const secFine = secInizio + oreTotali*3600;

        const skuCount={};
        sessioni.filter(s=>s.lineaCorrente===lineaId&&(!s.fine||s.fine===""||s.fine===null)).forEach(s=>{
          const sk=s.skuCorrente||s.sku||"";
          if(sk&&!SKU_SPECIALI.some(x=>x.sku===sk)) skuCount[sk]=(skuCount[sk]||0)+1;
        });

        const skuObj = skuConSpecialiList.find(s=>s.sku===skuPiu);

            <div style={{width:4,height:36,background:"#7c3aed",borderRadius:2,flexShrink:0}}/>
            <div><div style={{fontWeight:800,fontSize:18,color:"#1e293b"}}>Qualità</div><div style={{fontSize:13,color:"#64748b",marginTop:4}}>Inserimento dati qualità</div></div>
          </button>
          <button onClick={()=>setSchermata("admin")} onMouseEnter={e=>e.currentTarget.style.border="2px solid #7c3aed"} onMouseLeave={e=>e.currentTarget.style.border="1.5px solid #a78bfa"} style={{width:"100%",padding:"22px 24px",background:"#f8fafc",border:"1.5px solid #a78bfa",borderRadius:14,cursor:"pointer",fontFamily:"'Montserrat',sans-serif",textAlign:"left",display:"flex",alignItems:"center",gap:18}}>
            <div style={{width:4,height:36,background:"#7c3aed",borderRadius:2,flexShrink:0}}/>
            <div><div style={{fontWeight:800,fontSize:18,color:"#1e293b"}}>Admin</div><div style={{fontSize:13,color:"#64748b",marginTop:4}}>Accesso amministratore</div></div>
          </button>
        </div>
      </div>
    </div>
  );
}

function LogoSpinner({size=48}) {
  // Aumenta la dimensione di rendering del 40% per dare più spazio alla N
  const s = Math.round(size * 1.4);
  const ring = Math.max(3, Math.floor(s/18));
  const inset = Math.floor(s/10);
  const pad = 2;
  return (
    <div style={{position:"relative",width:s,height:s,flexShrink:0}}>
      <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`${ring}px solid transparent`,borderTopColor:"#7c3aed",borderRightColor:"#a78bfa",animation:"spin 1s linear infinite",boxShadow:"0 0 10px 3px #7c3aed66"}}/>
      <div style={{position:"absolute",inset:Math.floor(inset/3),borderRadius:"50%",border:`${Math.max(2,ring-1)}px solid transparent`,borderBottomColor:"#6d28d9",borderLeftColor:"#c4b5fd",animation:"spin 1.5s linear infinite reverse"}}/>
      <div style={{position:"absolute",inset:inset,borderRadius:"50%",background:"linear-gradient(135deg,#ffffff,#f0f0f0,#e8e8e8,#f5f5f5)",boxShadow:"inset 2px 2px 6px rgba(0,0,0,0.1),0 0 0 2px #a78bfa",display:"flex",alignItems:"center",justifyContent:"center",padding:pad}}>
        <img src="logo_Nexus.png" style={{width:"100%",height:"100%",objectFit:"contain"}} alt="N"/>
      </div>
    </div>
  );
}
function App() { const [view,setView]             = useState("login");
  const [viewQualita,setViewQualita] = useState(false);
  const [autologinLinea, setAutologinLinea] = useState(null); // linea trovata da URL, aspetta password
  const [autologinPwd, setAutologinPwd] = useState("");
  const [autologinErr, setAutologinErr] = useState("");
  const [autologinLoading, setAutologinLoading] = useState(false);
  const [lineaQualita,setLineaQualita] = useState(null);
  const [sess,setSess]             = useState(()=>store.get("pt_v4",[]) );
  const [sessSheets,setSessSheets] = useState([]);
  const [accesso,setAccesso]       = useState(null);
  const [dashSync,setDashSync]     = useState("caricamento");
  const [ultimoSync2,setUltimoSync2] = useState(null);
  const { linee, operatori, skuList, difettiList, sync, ts, reload } = useSheets();
  useEffect(()=>{
    if(sync==="ok" && accesso && accesso.ruolo==="linea" && linee.length>0){
      const lineaAggiornata = linee.find(l=>l.id===accesso.linea.id);
      if(lineaAggiornata && lineaAggiornata.nome !== accesso.linea.nome){ setAccesso({...accesso, linea: lineaAggiornata}); }
    }
  },[sync, linee]);

  // Auto-login da URL
  useEffect(()=>{
    const autoLinea = getUrlParam("autolinea");
    if(!autoLinea || accesso) return;
    if(sync !== "ok" || linee.length === 0) return;
    (async()=>{
      try {
        const nomeLinea = autoLinea.replace(/_/g, " ");
        // Prima cerca nelle linee già caricate
        const lineaDiretta = linee.find(l => l.id.toLowerCase() === nomeLinea.toLowerCase());
        if(lineaDiretta) {
          // Se c'è un token nell'URL, verifica e logga direttamente
          const autoToken = getUrlParam("token");
          if(autoToken) {
            const tokenOk = lineaDiretta.tokenLinea && 
                            autoToken.toUpperCase() === lineaDiretta.tokenLinea.toUpperCase();
            if(tokenOk) {
              setAccesso({ruolo:"linea", linea:lineaDiretta});
              setView("checkin");
              return;
            }
          }
          // Altrimenti mostra richiesta password
          setAutologinLinea(lineaDiretta);
          return;
        }
        // Altrimenti chiama lo script
        const r = await fetchConRetry(APPS_SCRIPT_URL+"?action=autologin&linea="+encodeURIComponent(nomeLinea)+"&token="+AUTO_TOKEN, 3, 1000);
        const j = await r.json();
        if(j.ok && j.data && j.data.ok) {
          const l = j.data.linea;
          const lineaObj = linee.find(x=>x.id===l.id) || l;
          setAutologinLinea(lineaObj);
        }
      } catch(e){ console.warn("Auto-login fallito:", e); }
    })();
  },[sync, linee, accesso]);
  useEffect(()=>{ store.set("pt_v4",sess); },[sess]);
  const [rampeSheets,setRampeSheets] = useState([]);
  const caricaSessioni = useCallback(async()=>{ setDashSync("caricamento");
    try { const ctrl2 = new AbortController();
      const tid2 = setTimeout(()=>ctrl2.abort(), 25000);
      const r = await fetch(nexusUrl("sessioni",{}), {signal:ctrl2.signal}).finally(()=>clearTimeout(tid2));
      const j = await r.json();
      if(j.ok&&j.data.sessioni){ 
        const tuttiSess = [...j.data.sessioni, ...(j.data.pianificati||[])];
        setSessSheets(tuttiSess); window._sessSheets=tuttiSess;
        if(j.data.rampe){ setRampeSheets(j.data.rampe); window._rampeSheets=j.data.rampe; }
        if(j.data.sessioni.length === 0){ setSess([]); setSessSheets([]); }
        setDashSync("ok"); setUltimoSync2(new Date());
        } else setDashSync("errore"); } catch(e){ setDashSync("errore"); } },[]);
  useEffect(()=>{ caricaSessioni();
    const t = setInterval(caricaSessioni, 30000);
    return ()=>clearInterval(t); },[caricaSessioni]);
  const add = s => { setSess(p=>[s,...p]);
    api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:s.sku,tipo:"CHECKIN",lineaDa:s.lineaCorrente,lineaA:s.lineaCorrente,skuDa:s.sku,skuA:s.sku+(s.rampa&&s.rampaDal?("__RAMPA__"+new Date(s.rampaDal).toISOString()):"")}); };
  const co = id => { setSess(p=>p.map(s=>{ if(s.id!==id)return s; api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:s.skuCorrente||s.sku,tipo:"CHECKOUT",lineaDa:s.lineaCorrente,lineaA:"",skuDa:s.skuCorrente||s.sku,skuA:""}); return {...s,fine:now().toISOString()}; }));
    setTimeout(caricaSessioni,3000); };
  const coFromSheets = s => { if(!s||!s.id) return;
    api.evento({sessionId:s.id,matricola:s.matricola||"",nome:s.nome||"",cognome:s.cognome||"",sku:s.skuCorrente||s.sku||"",tipo:"CHECKOUT",lineaDa:s.lineaCorrente||"",lineaA:"",skuDa:s.skuCorrente||s.sku||"",skuA:""}); };
  const tr = (id,dest,nSku) => {
    setSess(p=>p.map(s=>{ if(s.id!==id)return s; const sp=s.skuCorrente||s.sku; const sn=nSku||sp; api.evento({sessionId:s.id,matricola:s.matricola,nome:s.nome,cognome:s.cognome,sku:sn,tipo:"TRASFERIMENTO",lineaDa:s.lineaCorrente,lineaA:dest,skuDa:sp,skuA:sn}); return {...s,lineaCorrente:dest,skuCorrente:sn,trasferimenti:[...s.trasferimenti,{da:s.lineaCorrente,a:dest,skuDa:sp,skuA:sn,quando:now().toISOString()}]}; }));
    // Aggiorna anche sessSheets immediatamente per visualizzazione Dashboard
    setSessSheets(p=>p.map(s=>{ if(s.id!==id)return s; const sp=s.skuCorrente||s.sku; const sn=nSku||sp; return {...s,lineaCorrente:dest,skuCorrente:sn,trasferimenti:[...(s.trasferimenti||[]),{da:s.lineaCorrente,a:dest,skuDa:sp,skuA:sn,quando:new Date().toISOString()}]}; }));
    setTimeout(caricaSessioni,3000); };
  const rst = () => { setSess([]); api.reset(); setTimeout(caricaSessioni,3000); };
  const syncCfg = {ok:{c:"#22c55e",t:"Sheets connesso"},caricamento:{c:"#f59e0b",t:"Connessione..."},errore:{c:"#ef4444",t:"Sheets non raggiungibile"}}[sync]||{c:"#475569",t:"Offline"};
  const dashCfg = {ok:{c:"#22c55e",t:"● Live"},caricamento:{c:"#f59e0b",t:"⟳ Sync..."},errore:{c:"#ef4444",t:"● Errore"}}[dashSync]||{c:"#475569",t:""};

  // Modalità readonly - nessun login, accesso diretto
  if(URL_VIEW==="readonly") {
    if(sync==="caricamento") return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5",flexDirection:"column",gap:16}}>
        <LogoSpinner size={96}/>
        <span style={{fontSize:36,fontWeight:800,color:"#7c3aed",letterSpacing:4,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
        <span style={{color:"#f59e0b",fontWeight:700,fontSize:15,fontFamily:"'Montserrat',sans-serif"}}>⟳ Caricamento...</span>
      </div>
    );
    return (
      <div style={{minHeight:"100vh",background:"#f0f2f5"}}>
        <div style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0",padding:"10px 20px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}} onClick={()=>{ if(onTornaIndietro) onTornaIndietro(); }}>
            <LogoSpinner size={32}/>
            <span style={{fontSize:14,fontWeight:800,color:"#7c3aed",letterSpacing:2,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
          </div>
          <span style={{marginLeft:8,fontSize:12,background:"#f59e0b22",color:"#f59e0b",border:"1px solid #f59e0b44",borderRadius:6,padding:"2px 10px",fontWeight:700}}>👁 Sola lettura</span>
          <span style={{marginLeft:"auto",fontSize:11,color:syncCfg.c,fontWeight:700}}>{syncCfg.t}</span>
        </div>
        <Dashboard sessioni={sessSheets} setSessioni={setSessSheets} linee={linee} skuList={skuList} operatori={operatori} rampeSheets={rampeSheets} isAdmin={true} lineaFiltro={null} onReset={null} onCO={null} onCOSheets={null} onTr={null} onAggiornaSessioni={caricaSessioni} readOnly={true} editOrario={URL_VIEW==="admin"} onTornaIndietro={()=>setView("checkin")}/>
      </div>
    );
  }

  // Modalità admin da URL
  if(URL_VIEW==="admin") {
    if(!adminUnlocked) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5"}}>
        <div style={{width:"100%",maxWidth:520,background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:20,padding:"52px 48px",animation:"fadeUp 0.4s ease",boxShadow:"0 0 0 4px #a78bfa, 0 0 40px 12px #7c3aed66",textAlign:"center"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:24}}>
            <LogoSpinner size={52}/>
            <span style={{fontSize:32,fontWeight:800,color:"#7c3aed",letterSpacing:3,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
          </div>
          <div style={{fontSize:13,color:"#64748b",marginBottom:16}}>Inserisci la password amministratore</div>
          <input type="password" style={{...S.inp,textAlign:"center",fontSize:18,letterSpacing:4,marginBottom:12,borderColor:"#7c3aed",borderWidth:2,background:"#f1f5f9",color:"#1e293b"}}
            placeholder="••••••••" value={adminPwd} onChange={e=>{setAdminPwd(e.target.value);setAdminPwdErr("");}}
            onKeyDown={e=>{ if(e.key==="Enter"){ if(adminPwd===ADMIN_PWD){setAdminUnlocked(true);setAccesso({ruolo:"admin",linea:null});} else {setAdminPwdErr("Password errata.");setAdminPwd("");} }}} autoFocus/>
          {adminPwdErr&&<div style={{...S.err,marginBottom:12}}>{adminPwdErr}</div>}
          <button style={{...S.bCI,background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"#ffffff"}} onClick={()=>{ if(adminPwd===ADMIN_PWD){setAdminUnlocked(true);setAccesso({ruolo:"admin",linea:null});} else {setAdminPwdErr("Password errata.");setAdminPwd("");} }}>Accedi</button>
        </div>
      </div>
    );
    // Admin sbloccato - continua con il render normale dell'app
  }

  // Schermata password per autologin da link diretto
  if(autologinLinea && !accesso) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f2f5"}}>
      <div style={{width:"100%",maxWidth:520,background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:20,padding:"52px 48px",animation:"fadeUp 0.4s ease",boxShadow:"0 0 0 4px #a78bfa, 0 0 40px 12px #7c3aed66",textAlign:"center"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:20}}>
          <LogoSpinner size={52}/>
          <span style={{fontSize:32,fontWeight:800,color:"#7c3aed",letterSpacing:3,fontFamily:"'Montserrat',sans-serif"}}>NEXUS</span>
        </div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:6,color:autologinLinea.colore||"#7c3aed"}}>{autologinLinea.id}</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Inserisci la password per accedere</div>
        <input type="password" style={{...S.inp,textAlign:"center",fontSize:18,letterSpacing:4,marginBottom:12,borderColor:autologinLinea.colore||"#7c3aed",borderWidth:2,background:"#f1f5f9",color:"#1e293b"}}
          placeholder="••••••••" value={autologinPwd}
          onChange={e=>{setAutologinPwd(e.target.value);setAutologinErr("");}}
          onKeyDown={e=>{ if(e.key==="Enter"){
            if(autologinPwd===autologinLinea.password||autologinPwd===ADMIN_PWD){
              setAutologinLoading(true);
              setTimeout(()=>{ setAccesso({ruolo:"linea",linea:autologinLinea}); setView("checkin"); setAutologinLinea(null); setAutologinPwd(""); setAutologinLoading(false); }, 800);
            } else { setAutologinErr("Password non corretta."); setAutologinPwd(""); }
          }}} autoFocus/>
        {autologinErr&&<div style={{...S.err,marginBottom:12}}>{autologinErr}</div>}
        <button style={{...S.bCI,background:"linear-gradient(135deg,"+(autologinLinea.colore||"#7c3aed")+","+(autologinLinea.colore||"#7c3aed")+"cc)",display:"flex",alignItems:"center",justifyContent:"center",gap:10}} onClick={()=>{
          if(autologinPwd===autologinLinea.password||autologinPwd===ADMIN_PWD){
            setAutologinLoading(true);
            setTimeout(()=>{ setAccesso({ruolo:"linea",linea:autologinLinea}); setView("checkin"); setAutologinLinea(null); setAutologinPwd(""); setAutologinLoading(false); }, 800);
          } else { setAutologinErr("Password non corretta."); setAutologinPwd(""); }
        }}>
          {autologinLoading
            ? <><div style={{width:20,height:20,border:"3px solid rgba(255,255,255,0.4)",borderTop:"3px solid #fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/> Accesso...</>
            : "Accedi"}
        </button>
      </div>
    </div>
  );

  // Qualità come overlay modale invece di pagina intera

  if(!accesso && view !== "login") {
    return <LoginDashboard linee={linee} sync={sync} onLogin={(ruolo,linea)=>{ setAccesso({ruolo,linea}); setView("checkin"); }} onQualita={()=>setViewQualita("login")} onQualitaAdmin={()=>{ setLineaQualita(null); setViewQualita("dashboard"); }}/>;
  }
  // Qualità come overlay
  if(viewQualita==="login") return <LoginQualita linee={linee} sync={sync} onLogin={(l)=>{ setLineaQualita(l); setViewQualita("dashboard"); }} onBack={()=>setViewQualita(false)}/>;
  if(viewQualita==="dashboard"&&lineaQualita) return <DashboardQualita linea={lineaQualita} linee={linee} skuList={skuList} difettiList={difettiList} onEsci={()=>{ setLineaQualita(null); setViewQualita(false); setView("checkin"); }}/>;
  return (
    <div style={{minHeight:"100vh",background:"#f0f2f5",color:"#1e293b"}}>
      <div style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0",padding:"5px 20px",display:"flex",alignItems:"center",gap:12,fontSize:11}}>
        <span style={{color:syncCfg.c,fontWeight:700}}>{syncCfg.t}</span>
        {sync==="ok"&&<span style={{color:"#475569"}}>· {linee.length} linee · {operatori.length} operatori · {skuList.length} SKU · {ts?fmt(ts):"-"}</span>}
        {(sync==="ok"||sync==="errore")&&<button onClick={reload} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:11,padding:"2px 8px",fontFamily:"'Montserrat',sans-serif"}}>Ricarica</button>}
      </div>
      {view!=="checkin"&&(
        <div style={{display:"flex",gap:8,padding:"12px 20px",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",alignItems:"center"}}>
          {view==="dashboard"&&(
            <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:dashCfg.c,fontWeight:700}}>{dashCfg.t}</span>
              {ultimoSync2&&<span style={{fontSize:10,color:"#475569"}}>Aggiornato: {fmt(ultimoSync2)}</span>}
              <button onClick={caricaSessioni} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:11,padding:"2px 8px",fontFamily:"'Montserrat',sans-serif"}}>↻</button>
            </span>
          )}
        </div>
      )}
      {view==="checkin"&&(
        <CheckIn onSuccess={add} onCheckout={co} onTrasf={tr} sessioni={sess} sessSheets={sessSheets} coSheets={coFromSheets} aggiornaSessioni={()=>setTimeout(caricaSessioni,3000)} linee={linee} operatori={operatori} skuList={skuList} syncCfg={syncCfg} dashCfg={dashCfg} ultimoSync2={ultimoSync2} lineaFiltro={accesso&&accesso.ruolo==="linea"?accesso.linea:null} onGoToDashboard={()=>setView("dashboard")} onEsci={()=>{ setAccesso(null); setView("login"); }} rampeSheets={rampeSheets} onQualita={(l)=>{ setLineaQualita(l); setViewQualita("dashboard"); }}/>
      )}
      {view==="login"&&(
        <LoginDashboard linee={linee} sync={sync} onLogin={(ruolo,linea)=>{ setAccesso({ruolo,linea}); setView("checkin"); }} onQualita={()=>setViewQualita("login")} onQualitaAdmin={()=>{ setLineaQualita(null); setViewQualita("dashboard"); }}/>
      )}
      {view==="dashboard"&&accesso&&(
        <Dashboard
          sessioni={sessSheets}
          linee={linee} skuList={skuList} operatori={operatori}
          isAdmin={accesso.ruolo==="admin"}
          lineaFiltro={accesso.ruolo==="linea"?accesso.linea:null}
          onReset={rst} onCO={co} onCOSheets={coFromSheets} onTr={tr}
          onAggiornaSessioni={()=>setTimeout(caricaSessioni,3000)}
          rampeSheets={rampeSheets}
          editOrario={true}
          onTornaIndietro={()=>setView("checkin")}/>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
