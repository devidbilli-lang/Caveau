<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f0f5;--surface:#fff;--border:#e0e0ec;--accent:#f26eff;--accent2:#d400e8;--accent-glow:rgba(242,110,255,0.15);--green:#059669;--red:#dc2626;--text:#1a1a2e;--text-muted:#6b6b8a;--text-dim:#b0b0c8;--shadow:0 2px 12px rgba(242,110,255,0.08);}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
.full-wrap{width:100vw;position:relative;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;padding:0 16px;}
.inner{max-width:100%;}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 18px;border-bottom:2px solid var(--border);margin-bottom:0;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-icon{width:52px;height:52px;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(242,110,255,0.3);flex-shrink:0;}
.brand-name{font-size:26px;font-weight:900;letter-spacing:3px;}
.brand-sub{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.header-right{display:flex;align-items:center;gap:12px;}
.clock{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--accent);background:var(--surface);border:2px solid var(--accent);padding:7px 18px;border-radius:10px;}
.conn-pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);}
.conn-pill.ok{border-color:#86efac;color:var(--green);}
.conn-pill.ok::before{content:"●";color:#86efac;}
.conn-pill.err{border-color:#fca5a5;color:var(--red);}
.conn-pill.err::before{content:"●";color:#fca5a5;}
.conn-pill.load{border-color:#fcd34d;color:#d97706;}
.conn-pill.load::before{content:"●";color:#fcd34d;}
.filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 0;border-bottom:1.5px solid var(--border);}
.filters input[type=text]{padding:10px 14px;font-size:13px;font-weight:600;background:#fff;border:1.5px solid rgba(242,110,255,0.35);border-radius:10px;font-family:'Montserrat',sans-serif;width:155px;}
.filters input[type=text]:focus{outline:none;border-color:var(--accent);}
.search-wrap{position:relative;}
.search-wrap input{padding-right:28px;}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;}
.dropdown-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--accent);border-radius:10px;max-height:220px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(242,110,255,0.12);}
.dropdown-list.open{display:block;}
.dropdown-item{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;}
.dropdown-item:hover{background:#f0f0ff;color:var(--accent);}
.dropdown-item mark{background:none;color:var(--accent);font-weight:700;}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:10px 18px;}
.btn-green:hover{opacity:0.9;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;padding:10px 18px;}
.btn-primary:hover{opacity:0.9;}
.btn-danger{background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;padding:5px 10px;}
.btn-danger:hover{background:#fca5a5;color:#fff;}
.btn-edit{background:#fff;color:#333;border:2px solid #1a1a2e;border-radius:8px;font-size:16px;cursor:pointer;padding:5px 9px;line-height:1;box-shadow:0 2px 8px rgba(242,110,255,0.15);}
.btn-edit:hover{background:#c4b5fd;color:#fff;}
.rep-layout{display:grid;grid-template-columns:1fr 250px;gap:16px;align-items:start;margin-top:0;}
.table-wrap{border-radius:12px;overflow:visible;border:1.5px solid var(--border);width:100%;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;table-layout:auto;}
thead tr{position:sticky;top:0;z-index:10;}
thead th{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:11px 8px;text-align:center;vertical-align:middle;font-size:11px;font-weight:800;letter-spacing:0.5px;color:#fff;text-transform:uppercase;white-space:normal;line-height:1.3;}
thead th.th-tot{background:#86efac;color:#1a1a2e;}
thead th.th-act{background:#1a1a2e;color:#fff;width:90px;}
thead th.th-note-a1{width:90px;min-width:90px;background:#97fdff;color:#000;font-size:14px;vertical-align:middle;text-align:center;padding:10px 6px;min-height:60px;}
thead th.th-note-b1{width:90px;min-width:90px;background:#ffc572;color:#000;font-size:14px;vertical-align:middle;text-align:center;padding:10px 6px;min-height:60px;}
thead th.th-note-c1{width:90px;min-width:90px;background:#feff93;color:#000;font-size:14px;vertical-align:middle;text-align:center;padding:10px 6px;min-height:60px;}
thead th.th-note-d1{width:90px;min-width:90px;background:#ff5e5e;color:#fff;font-size:14px;vertical-align:middle;text-align:center;padding:10px 6px;min-height:60px;}
.th-sub{font-size:10px;font-weight:600;color:inherit;display:block;margin-top:2px;text-transform:none;letter-spacing:0;white-space:normal;line-height:1.2;text-align:center;}
.col-note-libere{width:180px;min-width:180px;max-width:180px;}
tbody td{padding:10px 6px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-weight:500;font-size:13px;white-space:nowrap;}
tbody td.td-note-lib{width:180px;min-width:180px;max-width:180px;white-space:normal;word-break:break-word;font-size:13px;text-align:center;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even){background:#f8f8fd;}
tbody tr:hover{background:#eeeeff;}
.td-zero{color:var(--text-dim);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;background:#86efac;color:#1a1a2e;}
.td-tot{font-weight:800;}
.empty{text-align:center;padding:48px;color:var(--text-muted);font-size:15px;font-weight:600;}
.alert-box{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:9999;display:none;max-width:320px;}
.alert-box.ok{background:#ecfdf5;color:#059669;border:1.5px solid #86efac;}
.alert-box.err{background:#fef2f2;color:#dc2626;border:1.5px solid #fca5a5;}
.pie-card{background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:14px;text-align:center;box-shadow:0 0 16px 4px rgba(242,110,255,0.5),0 0 48px 12px rgba(242,110,255,0.2);}
.right-card{background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:20px;box-shadow:0 0 16px 4px rgba(242,110,255,0.5),0 0 48px 12px rgba(242,110,255,0.2);}
.right-card-title{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#f26eff;}
/* ADD FORM */
.add-toggle-btn{width:100%;padding:13px;background:none;border:2px dashed rgba(242,110,255,0.4);border-radius:10px;font-size:13px;font-weight:800;color:var(--accent);cursor:pointer;letter-spacing:1px;text-transform:uppercase;margin-top:12px;}
.add-toggle-btn:hover{background:rgba(242,110,255,0.05);}
.add-form-body{background:var(--surface);border:2px dashed rgba(242,110,255,0.3);border-radius:12px;padding:20px;margin-top:12px;display:none;}
.add-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.fg input,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid rgba(242,110,255,0.35);border-radius:8px;font-size:13px;font-weight:600;font-family:'Montserrat',sans-serif;color:var(--text);background:#fff;}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--accent);}
.note-inputs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.note-inp-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.note-inp-wrap span{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;}
.note-inp-wrap input{width:72px;text-align:center;padding:8px 6px;border:1.5px solid rgba(242,110,255,0.4);border-radius:8px;font-size:14px;font-weight:700;font-family:'Montserrat',sans-serif;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:620px;box-shadow:0 20px 60px rgba(242,110,255,0.3);border:2px solid rgba(242,110,255,0.4);}
.modal-title{font-size:16px;font-weight:900;letter-spacing:1px;margin-bottom:4px;}
.modal-sub{font-size:14px;color:var(--text);font-weight:700;margin-bottom:20px;background:#f8f8fd;border-radius:10px;padding:10px 14px;border:1.5px solid var(--border);}
.modal-note-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.modal-note-item{text-align:center;display:flex;flex-direction:column;}
.modal-note-item label{font-size:11px;font-weight:800;padding:4px 6px;border-radius:6px;display:block;margin-bottom:4px;min-height:32px;display:flex;align-items:center;justify-content:center;line-height:1.2;}
.modal-note-item input{flex:1;text-align:center;border-radius:8px;padding:12px 4px;font-size:18px;font-weight:800;font-family:'Montserrat',sans-serif;width:100%;}
.modal-note-item{text-align:center;}
.modal-note-item label{display:block;font-size:11px;font-weight:800;margin-bottom:4px;padding:3px 6px;border-radius:6px;}
.modal-note-item input{width:100%;text-align:center;padding:10px 4px;border:1.5px solid rgba(242,110,255,0.4);border-radius:8px;font-size:15px;font-weight:700;font-family:'Montserrat',sans-serif;}
.modal-note-item input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;}
/* BORSA */
.borsa-box{background:var(--surface);border:1.5px solid rgba(242,110,255,0.3);border-radius:12px;padding:14px;margin-top:12px;}
.borsa-box-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}

.fab-add{position:fixed;bottom:32px;left:40px;z-index:200;background:rgba(97,255,169,0.38);color:#00c96b;border:4px solid #61ffa9;border-radius:50px;padding:14px 26px;font-size:14px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 20px rgba(97,255,169,0.35);display:flex;align-items:center;gap:8px;transition:all 0.2s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.fab-add:hover{background:rgba(97,255,169,0.4);box-shadow:0 6px 28px rgba(97,255,169,0.5);transform:translateY(-2px);}

.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:9000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.saving-overlay.open{display:flex;}
.spinner{width:48px;height:48px;border:5px solid rgba(242,110,255,0.2);border-top-color:#f26eff;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.saving-msg{color:#fff;font-size:15px;font-weight:800;letter-spacing:1px;}
.success-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:3px solid #00c853;border-radius:20px;padding:28px 40px;text-align:center;z-index:9001;display:none;box-shadow:0 20px 60px rgba(0,200,83,0.25);}
.success-toast.open{display:block;}
.success-toast .check{font-size:48px;display:block;margin-bottom:8px;}
.success-toast .msg{font-size:16px;font-weight:800;color:#1a1a2e;}
</style>
</head>
<body>
<div id="alert-box" class="alert-box"></div>


<div class="saving-overlay" id="saving-overlay">
  <div class="spinner"></div>
  <div class="saving-msg" id="saving-msg">Salvataggio in corso...</div>
</div>
<div class="success-toast" id="success-toast">
  <span class="check">✓</span>
  <div class="msg" id="success-msg">Movimento salvato!</div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Modifica riga</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-note-grid" id="modal-note-grid"></div>
    <div class="fg" style="margin-bottom:10px;">
      <label>Note Libere</label>
      <textarea id="modal-note-lib" rows="2" style="resize:none;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="if(editingRow&&confirm('Eliminare la riga?'))eliminaRigaModal()">Elimina</button>
      <div style="flex:1;"></div>
      <button style="padding:10px 18px;background:none;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;" onclick="closeModal()">Annulla</button>
      <button class="btn-primary" onclick="salvaModifica()">Salva</button>
    </div>
  </div>
</div>

<div class="full-wrap">
<div class="inner">

<header>
  <div class="brand">
    <div class="brand-icon">
      <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGRlZnM+CiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6I2YyNmVmZiIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiNkNDAwZTgiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgPC9kZWZzPgogIDxyZWN0IHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiByeD0iOTYiIGZpbGw9InVybCgjYmcpIi8+CiAgPHJlY3QgeD0iMTI4IiB5PSIyNDgiIHdpZHRoPSIyNTYiIGhlaWdodD0iMTg0IiByeD0iMjgiIGZpbGw9IndoaXRlIi8+CiAgPHBhdGggZD0iTTE2OCAyNDggVjE4MCBDMTY4IDEwOCAzNDQgMTA4IDM0NCAxODAgVjI0OCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI0MCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBmaWxsPSJub25lIi8+CiAgPGNpcmNsZSBjeD0iMjU2IiBjeT0iMzMwIiByPSIzMiIgZmlsbD0iI2YyNmVmZiIvPgogIDxyZWN0IHg9IjI0MCIgeT0iMzQ2IiB3aWR0aD0iMzIiIGhlaWdodD0iMzYiIHJ4PSI4IiBmaWxsPSIjZjI2ZWZmIi8+Cjwvc3ZnPgo=" width="52" height="52" style="display:block;"/>

    <div>

  <div class="header-right">

</header>

<div class="filters">
  <div class="search-wrap" style="z-index:25;">
    <input type="text" id="r-rep" placeholder="Nome..." autocomplete="off" style="width:200px;" oninput="filterFDrop('rep')" onfocus="openFDrop('rep')" onblur="blurFDrop('rep')"/>
    <button class="clear-btn" onmousedown="clearFDrop('rep')">x</button>
    <div class="dropdown-list" id="fdrop-rep"></div>
  </div>
  <div class="search-wrap" style="z-index:25;">
    <input type="text" id="r-art" placeholder="Desc. articolo..." autocomplete="off" style="width:240px;" oninput="filterFDrop('art')" onfocus="openFDrop('art')" onblur="blurFDrop('art')"/>
    <button class="clear-btn" onmousedown="clearFDrop('art')">x</button>
    <div class="dropdown-list" id="fdrop-art"></div>
  </div>
  <div class="search-wrap" style="z-index:25;">
    <input type="text" id="r-cluster" placeholder="Cluster caveau..." autocomplete="off" oninput="filterFDrop('cluster')" onfocus="openFDrop('cluster')" onblur="blurFDrop('cluster')"/>
    <button class="clear-btn" onmousedown="clearFDrop('cluster')">x</button>
    <div class="dropdown-list" id="fdrop-cluster"></div>
  </div>
  <div class="search-wrap" style="z-index:25;">
    <input type="text" id="r-brand" placeholder="Brand..." autocomplete="off" oninput="filterFDrop('brand')" onfocus="openFDrop('brand')" onblur="blurFDrop('brand')"/>
    <button class="clear-btn" onmousedown="clearFDrop('brand')">x</button>
    <div class="dropdown-list" id="fdrop-brand"></div>
  </div>
  <div class="search-wrap" style="z-index:30;">
    <input type="text" id="r-data-txt" placeholder="Data..." autocomplete="off" style="width:150px;"
      oninput="filterDataDrop()" onfocus="openDataDrop()" onblur="blurDataDrop()"/>
    <button class="clear-btn" onmousedown="clearDataFiltro()">x</button>
    <div class="dropdown-list" id="drop-data"></div>
  </div>
  <div class="search-wrap" style="z-index:28;">
    <input type="text" id="r-week-txt" placeholder="Settimana..." autocomplete="off" style="width:180px;"
      oninput="filterWeekDrop()" onfocus="openWeekDrop()" onblur="blurWeekDrop()"/>
    <button class="clear-btn" onmousedown="clearWeekFiltro()">x</button>
    <div class="dropdown-list" id="drop-week"></div>
  </div>
  <button class="btn-green" onclick="loadR()">↻ Aggiorna</button>
</div>

<div class="rep-layout">
  <div>
    <div class="table-wrap">
      <table>
        <thead id="tbl-head"></thead>
        <tbody id="tb"><tr><td class="empty">Caricamento...</td></tr></tbody>
      </table>
    </div>

<script>
var BASE='https://script.google.com/macros/s/AKfycby3ijsI1oE2t_lObb9hZ_TRh_JKCQ1VzPHrVBA6k3fxR2sSQ2ZzPvStmzNAe-93chPlPw/exec';
var NOTE_COLORS={'A1':'#97fdff','B1':'#ffc572','C1':'#feff93','D1':'#ff5e5e'};
var NOTE_DEFAULT='#f26eff';
var tid=0,allRows=[],rHeaders=[],noteDescMap={},artDescMap={},artCollMap={},artBrandMap={};
var repData=[],dropData={};
var dateList=[],selectedDate='',selectedWeek='';
var editingRow=null;

setInterval(function(){var n=new Date();document.getElementById('clk').textContent=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2);},1000);
function setConn(s,t){var e=document.getElementById('conn');e.className='conn-pill '+s;document.getElementById('conn-txt').textContent=t;}
function syncData(){
  var icon=document.getElementById('sync-icon');
  // Show syncing state in conn pill
  setConn('load','Sincronizzazione...');
  icon.style.transition='transform 1s linear';
  icon.style.transform='rotate(720deg)';
  setTimeout(function(){icon.style.transition='';icon.style.transform='rotate(0deg)';},1000);
  // Reload data silently without clearing table
  gp('read_riepilogo',{},function(d){
    if(!d.ok){setConn('err','Errore sync');return;}
    rHeaders=d.headers||[];
    var newRows=(d.rows||[]).filter(function(r){return r[0];});
    newRows.sort(function(a,b){return toISO(formatDate(b[0])).localeCompare(toISO(formatDate(a[0])));});
    allRows=newRows;
    renderHead();buildDateDrop();buildAfNoteInputs();buildFDropLists();filtra();
    setConn('ok','Connesso');
  });
  loadBorseFerme();
}
function gp(action,params,cb){
  var fn='_cb'+(tid++);var el=document.createElement('script');
  var q=new URLSearchParams(Object.assign({action:action,callback:fn,t:Date.now()},params||{})).toString();
  el.src=BASE+'?'+q;
  window[fn]=function(d){delete window[fn];el.remove();cb(d);};
  el.onerror=function(){delete window[fn];el.remove();cb({ok:false,error:'Errore connessione'});};
  document.head.appendChild(el);
}
function todayLocal(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function formatDate(v){
  if(!v&&v!==0)return'';var s=String(v);
  if(s.match(/^\d{2}\/\d{2}\/\d{4}/))return s.slice(0,10);
  if(s.indexOf('T')>0){var d=new Date(s);var loc=new Date(d.getTime()-d.getTimezoneOffset()*60000);var p=loc.toISOString().slice(0,10).split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  var p=s.slice(0,10).split('-');if(p.length===3&&p[0].length===4)return p[2].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+p[0];
  return s.slice(0,10);
}
function toISO(d){var p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;}
function localToDisplay(iso){var p=iso.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function getNoteColor(cod){return NOTE_COLORS[cod.toUpperCase()]||NOTE_DEFAULT;}
function getNoteThClass(cod){var u=cod.toUpperCase();if(u==='A1')return'th-note-a1';if(u==='B1')return'th-note-b1';if(u==='C1')return'th-note-c1';if(u==='D1')return'th-note-d1';return'';}
var HIDDEN=['note','codice','notes'];
function isHidden(col){return HIDDEN.indexOf(col.toLowerCase())>=0;}
function isNoteLibere(col){return col.toLowerCase()==='note libere';}
function getNoteIndices(){
  var r=[];var artIdx=rHeaders.indexOf('Articolo');var start=artIdx>=0?artIdx+1:4;
  for(var i=start;i<rHeaders.length;i++){if(rHeaders[i]==='Totale')break;if(!isHidden(rHeaders[i]))r.push(i);}
  return r;
}
function buildDropData(type,data,skip){
  dropData[type]=[];
  for(var i=skip?1:0;i<data.length;i++){if(!data[i][0])continue;dropData[type].push({cod:String(data[i][0]),desc:data[i][1]?String(data[i][1]):''});}
}
function getTxtId(type){
  if(type==='af-rep')return'faf-rep-txt';
  if(type==='af-art')return'faf-art-txt';
  if(type==='fborsa')return'ffborsa-txt';
  return'f'+type+'-txt';
}
function getHidId(type){
  if(type==='af-rep')return'faf-rep';
  if(type==='af-art')return'faf-art';
  if(type==='fborsa')return'ffborsa';
  return'f'+type;
}
function getSrc(type){
  if(type==='af-rep')return dropData['rep']||[];
  if(type==='af-art')return dropData['art']||[];
  if(type==='fborsa')return dropData['borsa']||[];
  return dropData[type]||[];
}
function filterDrop(type){
  var txtEl=document.getElementById(getTxtId(type));if(!txtEl)return;
  var txt=txtEl.value.toLowerCase();
  var src=getSrc(type);
  var list=document.getElementById('drop-'+type);if(!list)return;
  var items=src.filter(function(x){
    var coll=artCollMap[x.cod]||'';
    return x.cod.toLowerCase().indexOf(txt)>=0||(x.desc&&x.desc.toLowerCase().indexOf(txt)>=0)||(coll&&coll.toLowerCase().indexOf(txt)>=0);
  });
  list.innerHTML='';
  items.forEach(function(x){
    var safe=txt.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    var hl=safe?x.cod.replace(new RegExp('('+safe+')','gi'),'<mark>$1</mark>'):x.cod;
    var coll=artCollMap[x.cod]||'';
    var div=document.createElement('div');
    div.className='dropdown-item';
    div.innerHTML='<span style="font-weight:700;">'+hl+'</span>'+
      (x.desc?' <span style="color:var(--text-muted);font-size:11px;">'+x.desc+'</span>':'')+
      (coll?' <span style="color:#e91e8c;font-size:11px;font-weight:700;">'+coll+'</span>':'');
    (function(cod,desc){div.addEventListener('mousedown',function(){selectDrop(type,cod,desc);});})(x.cod,x.desc||'');
    list.appendChild(div);
  });
  if(!items.length)list.innerHTML='<div class="dropdown-item" style="color:var(--text-dim)">Nessun risultato</div>';
  list.classList.add('open');
}
function openDrop(type){filterDrop(type);}
function blurDrop(type){setTimeout(function(){var l=document.getElementById('drop-'+type);if(l)l.classList.remove('open');},150);}
function selectDrop(type,val,desc){
  var txtEl=document.getElementById(getTxtId(type));var hidEl=document.getElementById(getHidId(type));
  if(txtEl)txtEl.value=val+(desc?' - '+desc:'');
  if(hidEl)hidEl.value=val;
  var list=document.getElementById('drop-'+type);if(list)list.classList.remove('open');
}
function clearSrch(type){
  var txtEl=document.getElementById(getTxtId(type));var hidEl=document.getElementById(getHidId(type));
  if(txtEl)txtEl.value='';if(hidEl)hidEl.value='';
}
// FILTER DROPDOWNS
var fDropLists={rep:[],art:[],cluster:[],brand:[]};
function buildFDropLists(){
  var linee={},arti={},clusters={},brands={};
  var artIdx=rHeaders.indexOf('Articolo');var lineaIdx=rHeaders.indexOf('Linea');
  var ni=getNoteIndices();
  allRows.forEach(function(r){
    if(r[1])linee[String(r[1])]=1;
    var cod=artIdx>=0?String(r[artIdx]||''):'';
    if(cod){
      var desc=artDescMap[cod]||'';if(desc)arti[desc]=1;
      var brand=artBrandMap[cod]||'';if(brand)brands[brand]=1;
    }
    ni.forEach(function(i){if((parseFloat(r[i])||0)>0)clusters[rHeaders[i]]=1;});
  });
  // Also add all known values
  Object.keys(artDescMap).forEach(function(k){if(artDescMap[k]){var coll=artCollMap[k]||'';var label=artDescMap[k]+(coll?' — '+coll:'');arti[label]=1;}});
  Object.keys(artBrandMap).forEach(function(k){if(artBrandMap[k])brands[artBrandMap[k]]=1;});
  Object.keys(noteDescMap).forEach(function(k){clusters[k]=1;});
  fDropLists.rep=Object.keys(linee).sort();
  fDropLists.art=Object.keys(arti).sort();
  fDropLists.cluster=Object.keys(clusters).sort();
  fDropLists.brand=Object.keys(brands).sort();
}
function filterFDrop(type){
  var el=document.getElementById('r-'+type);if(!el)return;
  var txt=el.value.toLowerCase();
  var list=document.getElementById('fdrop-'+type);if(!list)return;
  var items=(fDropLists[type]||[]).filter(function(v){return v.toLowerCase().indexOf(txt)>=0;});
  list.innerHTML='';
  items.forEach(function(v){
    var div=document.createElement('div');div.className='dropdown-item';
    div.textContent=v;
    div.addEventListener('mousedown',function(){
      el.value=v;list.classList.remove('open');filtra();
    });
    list.appendChild(div);
  });
  if(!items.length)list.innerHTML='<div class="dropdown-item" style="color:var(--text-dim)">Nessun risultato</div>';
  list.classList.add('open');
}
function openFDrop(type){filterFDrop(type);}
function blurFDrop(type){setTimeout(function(){var l=document.getElementById('fdrop-'+type);if(l)l.classList.remove('open');},150);}
function clearFDrop(type){var el=document.getElementById('r-'+type);if(el)el.value='';filtra();}

function buildDateDrop(){
  var dates={};allRows.forEach(function(r){var d=formatDate(r[0]);if(d)dates[d]=1;});
  dateList=Object.keys(dates).sort(function(a,b){return toISO(b).localeCompare(toISO(a));});
  buildWeekList();
}
// WEEK FILTER
var weekList=[];
function getWeekKey(dateStr){
  var p=dateStr.split('/');if(p.length!==3)return'';
  var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
  var jan1=new Date(d.getFullYear(),0,1);
  var weekNum=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return d.getFullYear()+'-W'+String(weekNum).padStart(2,'0');
}
function getWeekLabel(key){
  var parts=key.split('-W');if(parts.length!==2)return key;
  var year=parseInt(parts[0]);var week=parseInt(parts[1]);
  var jan1=new Date(year,0,1);var dayOfWeek=jan1.getDay()||7;
  var firstMon=new Date(jan1.getTime()+(dayOfWeek<=1?0:8-dayOfWeek)*86400000);
  var weekStart=new Date(firstMon.getTime()+(week-1)*7*86400000);
  var weekEnd=new Date(weekStart.getTime()+6*86400000);
  var fmt=function(d){return('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);};
  return'Sett. '+week+' ('+fmt(weekStart)+' - '+fmt(weekEnd)+'/'+year+')';
}
function buildWeekList(){
  var weeks={};
  allRows.forEach(function(r){var d=formatDate(r[0]);if(!d)return;var k=getWeekKey(d);if(k)weeks[k]=1;});
  weekList=Object.keys(weeks).sort(function(a,b){return b.localeCompare(a);});
}
function filterWeekDrop(){
  var txt=document.getElementById('r-week-txt').value.toLowerCase();
  var list=document.getElementById('drop-week');if(!list)return;
  list.innerHTML='';
  weekList.filter(function(k){return getWeekLabel(k).toLowerCase().indexOf(txt)>=0;}).forEach(function(k){
    var div=document.createElement('div');div.className='dropdown-item';
    div.textContent=getWeekLabel(k);
    div.addEventListener('mousedown',function(){selectWeek(k);});
    list.appendChild(div);
  });
  if(!weekList.length)list.innerHTML='<div class="dropdown-item" style="color:var(--text-dim)">Nessuna settimana</div>';
  list.classList.add('open');
}
function openWeekDrop(){filterWeekDrop();}
function blurWeekDrop(){setTimeout(function(){var l=document.getElementById('drop-week');if(l)l.classList.remove('open');},150);}
function selectWeek(k){
  selectedWeek=k;selectedDate='';
  document.getElementById('r-data-txt').value='';
  document.getElementById('r-week-txt').value=getWeekLabel(k);
  document.getElementById('drop-week').classList.remove('open');
  filtra();
}
function clearWeekFiltro(){selectedWeek='';document.getElementById('r-week-txt').value='';filtra();}
function filterDataDrop(){
  var txt=document.getElementById('r-data-txt').value.toLowerCase();
  var list=document.getElementById('drop-data');
  var items=dateList.filter(function(d){return d.indexOf(txt)>=0;});
  list.innerHTML='';
  items.forEach(function(d){
    var div=document.createElement('div');div.className='dropdown-item';div.textContent=d;

function fixStickyHead(){

function renderHead(){
  var ni=getNoteIndices();
  var h='<tr><th class="th-act">Azioni</th>';

    var col=rHeaders[i];if(isHidden(col))continue;
    if(col==='Totale'){h+='<th class="th-tot">Totale</th>';continue;}
    if(isNoteLibere(col)){h+='<th class="col-note-libere" style="background:linear-gradient(135deg,#f26eff,#d400e8);color:#fff;">Note Libere</th>';continue;}
    if(ni.indexOf(i)>=0){var desc=noteDescMap[col]||'';h+='<th class="'+getNoteThClass(col)+'">'+col+(desc?'<span class="th-sub">'+desc+'</span>':'')+'</th>';}
    else{h+='<th>'+col+'</th>';}
  }

function filtra(){
  fixStickyHead();
  var rep=document.getElementById('r-rep').value.toLowerCase();
  var art=document.getElementById('r-art').value.toLowerCase();
  var cluster=document.getElementById('r-cluster').value.toLowerCase();
  var artIdx=rHeaders.indexOf('Articolo');var lineaIdx=rHeaders.indexOf('Linea');
  var ni=getNoteIndices();
  var f=allRows.filter(function(r){
    if(rep){var lv=lineaIdx>=0?String(r[lineaIdx]||'').toLowerCase():'';var nv=String(r[1]||'').toLowerCase();if(lv.indexOf(rep)<0&&nv.indexOf(rep)<0)return false;}
    if(art){var cod=String(r[artIdx>=0?artIdx:3]||'');var desc=(artDescMap[cod]||'').toLowerCase();var coll2=(artCollMap[cod]||'').toLowerCase();if(desc.indexOf(art)<0&&cod.toLowerCase().indexOf(art)<0&&coll2.indexOf(art)<0)return false;}
    if(cluster){var found=false;ni.forEach(function(i){var cn=rHeaders[i].toLowerCase();var qty=parseFloat(r[i])||0;if(cn.indexOf(cluster)>=0&&qty>0)found=true;var dc=(noteDescMap[rHeaders[i]]||'').toLowerCase();if(dc.indexOf(cluster)>=0&&qty>0)found=true;});if(!found)return false;}
    var brand=document.getElementById('r-brand')?document.getElementById('r-brand').value.toLowerCase():'';
    if(brand){var cod2=String(r[artIdx>=0?artIdx:3]||'');var br=(artBrandMap[cod2]||'').toLowerCase();if(br.indexOf(brand)<0)return false;}
    if(selectedDate&&formatDate(r[0])!==selectedDate)return false;
    return true;
  });
  var gDate=selectedDate||(dateList.length?dateList[0]:'');
  var gWeek=selectedWeek;
  var brandFiltro=document.getElementById('r-brand')?document.getElementById('r-brand').value.toLowerCase():'';
  var rep2=document.getElementById('r-rep').value.toLowerCase();
  var art2=document.getElementById('r-art').value.toLowerCase();
  var cluster2=document.getElementById('r-cluster').value.toLowerCase();
  var hasFilter=rep2||art2||cluster2||brandFiltro||selectedDate||selectedWeek;
  var fG;
  if(hasFilter){
    fG=f; // usa le righe già filtrate
  } else {
    // nessun filtro: mostra ultima data
    fG=allRows.filter(function(r){return formatDate(r[0])===gDate;});
  }
  renderPie(fG);renderBarChart(fG);
  updateTotalBadge(f);
  var tb=document.getElementById('tb');
  if(!f.length){tb.innerHTML='<tr><td colspan="'+(rHeaders.filter(function(h){return!isHidden(h);}).length+1)+'" class="empty">Nessun dato trovato</td></tr>';return;}
  tb.innerHTML='';
  f.forEach(function(r){
    var dStr=formatDate(r[0]);var nome=String(r[1]||'');
    var artCol=rHeaders.indexOf('Articolo');var artVal=artCol>=0?String(r[artCol]||''):'';
    var tr=document.createElement('tr');
    var tdAct=document.createElement('td');tdAct.style.whiteSpace='nowrap';
    var btnEdit=document.createElement('button');btnEdit.className='btn-edit';btnEdit.textContent='✏️';
    (function(d,n,a){btnEdit.addEventListener('click',function(){openModal(d,n,a);});})(dStr,nome,artVal);
    tdAct.appendChild(btnEdit);tr.appendChild(tdAct);
    for(var i=0;i<rHeaders.length;i++){
      var col=rHeaders[i],val=r[i]!==undefined?r[i]:'';
      if(isHidden(col))continue;
      var td=document.createElement('td');
      if(col==='Data'){td.textContent=dStr;}
      else if(col==='Totale'){td.className='td-tot';td.innerHTML='<span class="badge">'+(parseFloat(val)||0)+'</span>';}
      else if(isNoteLibere(col)){td.className='td-note-lib';td.textContent=String(val||'');}
      else if(col==='Articolo'){var coll=artCollMap[String(val)]||'';var desc=artDescMap[String(val)]||'';td.style.maxWidth='160px';td.style.minWidth='120px';td.innerHTML=String(val)+(desc?'<br><span style="color:var(--text-muted);font-size:11px;">'+desc+'</span>':'')+(coll?'<br><span style="color:#e91e8c;font-size:11px;font-weight:700;">'+coll+'</span>':'');}
      else if(ni.indexOf(i)>=0){var n=parseFloat(val)||0,u=col.toUpperCase();if(n===0){td.className='td-zero';td.textContent='-';}else{var bg=getNoteColor(col);var fg=u==='D1'?'#fff':'#000';td.innerHTML='<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;background:'+bg+';color:'+fg+';">'+n+'</span>';}}
      else{td.textContent=String(val);}
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
}

function salvaSelzione(){
  var data=localToDisplay(document.getElementById('sel-data').value);
  if(!data){showAlert('Inserisci una data','err');return;}
  var ni=getNoteIndices();var artIdxL=rHeaders.indexOf('Articolo');var toSave=[];
  selectionRows.forEach(function(r,idx){
    var chk=document.getElementById('selchk-'+idx);if(!chk||!chk.checked)return;
    var nome=document.getElementById('selnome-'+idx).value.trim();
    var artVal=artIdxL>=0?String(r[artIdxL]||''):'';
    var noteEntries=[];
    ni.forEach(function(i){var col=rHeaders[i];var el=document.getElementById('selqty-'+idx+'-'+col);if(el){var q=parseFloat(el.value)||0;if(q>0)noteEntries.push(col+':'+q);}});
    if(!noteEntries.length)return;
    var linea='',ubicazione='';
    repData.forEach(function(row,i){if(i===0||!row[0])return;if(String(row[0]).trim()===nome){linea=String(row[1]||'');ubicazione=String(row[2]||'');}});
    toSave.push({data:data,reparto:nome,linea:linea,ubicazione:ubicazione,articolo:artVal,note:noteEntries.join(','),headers:rHeaders.join(',')});
  });
  if(!toSave.length){showAlert('Nessuna riga con qtà da salvare','err');return;}
  showSpinner('Salvataggio '+toSave.length+' righe...');
  var saved=0;var errors=0;
  function saveNext(i){
    if(i>=toSave.length){
      hideSpinner();closeSelezione();
      if(errors>0)showAlert('Salvate '+saved+' righe, '+errors+' errori','err');
      else showSuccess('Salvate '+saved+' righe!');
      setTimeout(function(){syncData();},500);
      return;
    }
    gp('write',toSave[i],function(r){if(r.ok)saved++;else errors++;saveNext(i+1);});
  }
  saveNext(0);
}

function aggiungiRiga(){
  var data=document.getElementById('af-data').value;
  var rep=document.getElementById('faf-rep').value;
  var art=document.getElementById('faf-art').value;
  if(!data||!rep||!art){showAlert('Compila Data, Reparto e Articolo','err');return;}
  var ni=getNoteIndices();var noteEntries=[];
  ni.forEach(function(i){var col=rHeaders[i];var el=document.getElementById('af-n-'+col);if(el){var q=parseFloat(el.value)||0;if(q>0)noteEntries.push(col+':'+q);}});
  if(!noteEntries.length){showAlert('Inserisci almeno una quantita cluster','err');return;}
  var nlib=document.getElementById('af-note-lib').value;
  var linea='',ubicazione='';
  repData.forEach(function(r,i){if(i===0||!r[0])return;if(String(r[0]).trim()===rep.trim()){linea=String(r[1]||'');ubicazione=String(r[2]||'');}});

  showSpinner('Salvataggio riga...');
  gp('write',{data:dataDisplay,reparto:rep,linea:linea,ubicazione:ubicazione,articolo:art,note:noteEntries.join(','),note_libere:nlib,headers:rHeaders.join(','),foglio:'Riepilogo'},function(r){
    if(r.ok){
      // Aggiorna localmente senza ricaricare tutto

      var colData2=rHeaders.indexOf('Data');var colNome2=rHeaders.indexOf('Nome');
      var colLinea2=rHeaders.indexOf('Linea');var colUbic2=rHeaders.indexOf('Ubicazione');
      var colArt2=rHeaders.indexOf('Articolo');var colNLib2=rHeaders.indexOf('Note Libere');
      var colTot2=rHeaders.indexOf('Totale');
      if(colData2>=0)newRow[colData2]=dataDisplay;
      if(colNome2>=0)newRow[colNome2]=rep;
      if(colLinea2>=0)newRow[colLinea2]=linea;
      if(colUbic2>=0)newRow[colUbic2]=ubicazione;
      if(colArt2>=0)newRow[colArt2]=art;
      if(colNLib2>=0)newRow[colNLib2]=nlib;
      var tot=0;
      ni.forEach(function(i){var col=rHeaders[i];var el=document.getElementById('af-n-'+col);if(el){var q=parseFloat(el.value)||0;if(q>0){newRow[i]=q;tot+=q;}}});

function salvaModifica(){
  if(!editingRow)return;
  var ni=getNoteIndices();var noteEntries=[];
  ni.forEach(function(i){var col=rHeaders[i];var el=document.getElementById('me-'+col);if(el){var q=parseFloat(el.value)||0;if(q>0)noteEntries.push(col+':'+q);}});

  showSpinner('Salvataggio modifica...');
  if(!noteEntries.length){
    // Solo elimina
    gp('delete_row',{data:editingRow.data,reparto:editingRow.nome,articolo:editingRow.articolo},function(rd){
      if(rd.ok){
        var artIdx2=rHeaders.indexOf('Articolo');
        allRows=allRows.filter(function(r){return!(formatDate(r[0])===editingRow.data&&String(r[1]||'')==editingRow.nome&&String(r[artIdx2>=0?artIdx2:3]||'')==editingRow.articolo);});
        buildDateDrop();filtra();showSuccess('Riga eliminata');closeModal();
      } else{hideSpinner();showAlert('Errore: '+rd.error,'err');}
    });
    return;
  }
  // Usa update_row (una sola chiamata invece di delete+write)
  gp('update_row',{data:editingRow.data,reparto:editingRow.nome,linea:linea,ubicazione:ubicazione,articolo:editingRow.articolo,note:noteEntries.join(','),note_libere:nlib,headers:rHeaders.join(',')},function(r){
    if(r.ok){
      var artIdx2=rHeaders.indexOf('Articolo');var colTot2=rHeaders.indexOf('Totale');var colNLib2=rHeaders.indexOf('Note Libere');
      allRows=allRows.map(function(row){
        if(formatDate(row[0])===editingRow.data&&String(row[1]||'')==editingRow.nome&&String(row[artIdx2>=0?artIdx2:3]||'')==editingRow.articolo){
          var updated=row.slice();
          var tot=0;
          getNoteIndices().forEach(function(i){var col=rHeaders[i];var el=document.getElementById('me-'+col);if(el){var q=parseFloat(el.value)||0;updated[i]=q;tot+=q;}});
          if(colTot2>=0)updated[colTot2]=tot;
          if(colNLib2>=0)updated[colNLib2]=nlib;
          return updated;
        }
        return row;
      });
      filtra();showSuccess('Modifica salvata!');closeModal();
    } else{hideSpinner();showAlert('Errore: '+(r.error||''),'err');}
  });
}

function eliminaRigaModal(){
  if(!editingRow)return;
  gp('delete_row',{data:editingRow.data,reparto:editingRow.nome,articolo:editingRow.articolo},function(r){
    if(r.ok){showAlert('Riga eliminata!','ok');closeModal();setTimeout(loadR,500);}
    else{showAlert('Errore: '+(r.error||''),'err');}
  });
}
function eliminaRiga(dStr,nome,art){
  if(!confirm('Eliminare la riga?\n'+dStr+' - '+nome+' - '+art))return;
  gp('delete_row',{data:dStr,reparto:nome,articolo:art},function(r){
    if(r.ok){showAlert('Riga eliminata!','ok');setTimeout(loadR,500);}
    else{showAlert('Errore: '+(r.error||''),'err');}
  });
}

function salvaBorsa(){
  var art=document.getElementById('ffborsa').value;var qta=parseFloat(document.getElementById('fborsa-qta').value)||0;
  var errEl=document.getElementById('err-borsa');errEl.style.display='none';
  if(!art){errEl.textContent='Seleziona un articolo';errEl.style.display='block';return;}
  if(qta<=0){errEl.textContent='Inserisci una quantita valida';errEl.style.display='block';return;}
  showSpinner('Salvataggio borsa...');
  gp('write_borsa',{articolo:art,descrizione:artDescMap[art]||'',quantita:qta},function(r){
    if(r.ok){showSuccess('Borsa Ferma salvata!');clearSrch('fborsa');document.getElementById('fborsa-qta').value='';loadBorseFerme();}
    else{hideSpinner();showAlert('Errore: '+(r.error||''),'err');}
  });
}
function smaltisciBorsa(){
  var art=document.getElementById('ffborsa').value;var qta=parseFloat(document.getElementById('fborsa-qta').value)||0;
  var errEl=document.getElementById('err-borsa');errEl.style.display='none';
  if(!art){errEl.textContent='Seleziona un articolo';errEl.style.display='block';return;}
  if(qta<=0){errEl.textContent='Inserisci una quantita valida';errEl.style.display='block';return;}
  showSpinner('Smaltimento borsa...');
  gp('write_borsa',{articolo:art,descrizione:artDescMap[art]||'',quantita:-qta},function(r){
    if(r.ok){showSuccess('Borsa smaltita!');clearSrch('fborsa');document.getElementById('fborsa-qta').value='';loadBorseFerme();}
    else{hideSpinner();showAlert('Errore: '+(r.error||''),'err');}
  });
}
function loadBorseFerme(){
  var div=document.getElementById('borse-chart');if(!div)return;
  gp('read_borse_ferme',{},function(d){
    if(!d.ok||!d.rows||!d.rows.length){div.innerHTML='<div style="color:var(--text-muted);font-size:12px;text-align:center;">Nessun dato</div>';return;}
    var rows=d.rows.filter(function(r){return r[0]&&(parseFloat(r[2])||0)>0;});
    rows.sort(function(a,b){return(parseFloat(b[2])||0)-(parseFloat(a[2])||0);});
    // Aggiorna badge totale
    var totBorse=rows.reduce(function(s,r){return s+(parseFloat(r[2])||0);},0);
    var badge=document.getElementById('borse-total-badge');
    if(badge){badge.textContent=totBorse;badge.style.display=totBorse>0?'inline':'none';}
    div.innerHTML=rows.map(function(r){var cod=String(r[0]);var desc=r[1]?String(r[1]):(artDescMap[cod]||'');var qta=parseFloat(r[2])||0;
      return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border);"><div style="flex:1;min-width:0;padding-right:6px;"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+cod+'</div>'+(desc?'<div style="font-size:10px;color:var(--text-muted);">'+desc+'</div>':'')+'</div><span style="background:#3b82f6;color:#fff;font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px;flex-shrink:0;">'+qta+'</span></div>';
    }).join('');
  });
}


function updateTotalBadge(filteredRows){
  var ni=getNoteIndices();
  var total=0;
  // Se nessun filtro attivo, usa l'ultima data
  var rep=document.getElementById('r-rep')?document.getElementById('r-rep').value:'';
  var art=document.getElementById('r-art')?document.getElementById('r-art').value:'';
  var cluster=document.getElementById('r-cluster')?document.getElementById('r-cluster').value:'';
  var brand=document.getElementById('r-brand')?document.getElementById('r-brand').value:'';
  var hasFilter=rep||art||cluster||brand||selectedDate||(typeof selectedWeek!=='undefined'&&selectedWeek);
  var rows=filteredRows;
  if(!hasFilter){
    var lastDate=dateList.length?dateList[0]:'';
    rows=allRows.filter(function(r){return formatDate(r[0])===lastDate;});
  }
  rows.forEach(function(r){ni.forEach(function(i){total+=(parseFloat(r[i])||0);});});
  var badge=document.getElementById('total-badge');
  if(badge)badge.textContent=total>0?total:'—';
}

function renderPie(rows){
  var canvas=document.getElementById('pieChart');var legend=document.getElementById('pie-legend');if(!canvas)return;
  var ni=getNoteIndices();if(!ni.length)return;
  var totals={};ni.forEach(function(i){totals[rHeaders[i]]=0;});
  rows.forEach(function(r){ni.forEach(function(i){totals[rHeaders[i]]+=(parseFloat(r[i])||0);});});
  var keys=Object.keys(totals).filter(function(k){return totals[k]>0;});
  var total=keys.reduce(function(s,k){return s+totals[k];},0);
  var W=canvas.width,H=canvas.height;var ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);
  var cx2=W/2,cy2=H/2,r2=cx2*0.9;if(!total){ctx.fillStyle='#e8e8f0';ctx.beginPath();ctx.arc(cx2,cy2,r2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx2,cy2,r2*0.49,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();legend.innerHTML='<div style="font-size:12px;color:var(--text-muted);text-align:center">Nessun dato</div>';return;}
  var startAngle=-Math.PI/2,cx=W/2,cy=H/2,r=cx*0.9;
  keys.forEach(function(k){var slice=(totals[k]/total)*Math.PI*2;var col=getNoteColor(k);ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startAngle,startAngle+slice);ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();startAngle+=slice;});
  ctx.beginPath();ctx.arc(cx,cy,r*0.49,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.font='bold 18px Montserrat,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  legend.innerHTML='<table style="width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;"><thead><tr>'+keys.map(function(k){var col=getNoteColor(k);var fg=k==='D1'?'#fff':'#000';return'<th style="background:'+col+';color:'+fg+';padding:6px 10px;font-weight:800;">'+k+'</th>';}).join('')+'</tr></thead><tbody><tr>'+keys.map(function(k){var col=getNoteColor(k);var fg=k==='D1'?'#fff':'#000';return'<td style="text-align:center;padding:8px 10px;font-weight:800;color:'+fg+';background:'+col+';">'+totals[k]+'</td>';}).join('')+'</tr></tbody></table>';
}

function renderBarChart(rows){
  try{
    var barDiv=document.getElementById('bar-chart');if(!barDiv)return;
    var artIdx=rHeaders.indexOf('Articolo');var totIdx=rHeaders.indexOf('Totale');if(artIdx<0||totIdx<0)return;
    var artTotals={};
    rows.forEach(function(r){var cod=String(r[artIdx]||'').trim();var tot=parseFloat(r[totIdx])||0;if(!cod||tot<=0)return;artTotals[cod]=(artTotals[cod]||0)+tot;});
    var entries=Object.keys(artTotals).map(function(k){return{cod:k,tot:artTotals[k]};}).sort(function(a,b){return b.tot-a.tot;});
    if(!entries.length){barDiv.innerHTML='<div style="color:var(--text-muted);font-size:12px;text-align:center;">Nessun dato</div>';return;}
    barDiv.innerHTML=entries.map(function(e){var desc=artDescMap[e.cod]||'';var coll=artCollMap[e.cod]||'';
      return'<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border);"><div style="flex:1;min-width:0;padding-right:6px;"><div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+e.cod+'</div>'+(desc?'<div style="font-size:10px;color:var(--text-muted);">'+desc+'</div>':'')+(coll?'<div style="font-size:10px;color:#e91e8c;font-weight:700;">'+coll+'</div>':'')+'</div><span style="background:#f26eff;color:#fff;font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px;flex-shrink:0;">'+e.tot+'</span></div>';
    }).join('');
  }catch(e){}
}

function showSpinner(msg){var o=document.getElementById('saving-overlay');document.getElementById('saving-msg').textContent=msg||'Salvataggio in corso...';o.classList.add('open');}
function hideSpinner(){document.getElementById('saving-overlay').classList.remove('open');}
function showSuccess(msg){
  hideSpinner();
  var t=document.getElementById('success-toast');
  document.getElementById('success-msg').textContent=msg||'Salvato!';
  t.classList.add('open');
  setTimeout(function(){t.classList.remove('open');},2000);
}
function showAlert(t,c){var e=document.getElementById('alert-box');e.textContent=t;e.className='alert-box '+c;e.style.display='block';setTimeout(function(){e.style.display='none';},4000);}

setInterval(function(){
  gp('init',{},function(d){
    if(!d.ok)return;
    (d.articoli||[]).forEach(function(r,i){if(i===0||!r[0])return;var c=String(r[0]);artDescMap[c]=r[1]?String(r[1]):'';artCollMap[c]=r[2]?String(r[2]):'';artBrandMap[c]=r[3]?String(r[3]):'';});
    repData=d.reparti||[];
    (d.cluster||[]).forEach(function(r,i){if(i===0||!r[0])return;noteDescMap[String(r[0])]=r[1]?String(r[1]):'';});
    buildDropData('art',d.articoli||[],true);buildDropData('rep',d.reparti||[],true);buildDropData('borsa',d.articoli||[],true);
  });
},5*60*1000);

// Sincronizzazione automatica ogni 60 secondi — dati fissi, aggiornamento silenzioso
setInterval(function(){syncData();},60*1000);

init();
</script>
