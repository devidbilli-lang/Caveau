<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caveau (Valentano) — Gestione Prodotto Finito</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGRlZnM+CiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6I2YyNmVmZiIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiNkNDAwZTgiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgPC9kZWZzPgogIDxyZWN0IHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiByeD0iOTYiIGZpbGw9InVybCgjYmcpIi8+CiAgPHJlY3QgeD0iMTI4IiB5PSIyNDgiIHdpZHRoPSIyNTYiIGhlaWdodD0iMTg0IiByeD0iMjgiIGZpbGw9IndoaXRlIi8+CiAgPHBhdGggZD0iTTE2OCAyNDggVjE4MCBDMTY4IDEwOCAzNDQgMTA4IDM0NCAxODAgVjI0OCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI0MCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBmaWxsPSJub25lIi8+CiAgPGNpcmNsZSBjeD0iMjU2IiBjeT0iMzMwIiByPSIzMiIgZmlsbD0iI2YyNmVmZiIvPgogIDxyZWN0IHg9IjI0MCIgeT0iMzQ2IiB3aWR0aD0iMzIiIGhlaWdodD0iMzYiIHJ4PSI4IiBmaWxsPSIjZjI2ZWZmIi8+Cjwvc3ZnPgo=">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0f0f5;
    --surface:#ffffff;
    --surface2:#f5f5fa;
    --border:#e0e0ec;
    --accent:#f26eff;
    --accent2:#d400e8;
    --accent-glow:rgba(242,110,255,0.15);
    --green:#059669;
    --green-bg:#ecfdf5;
    --red:#dc2626;
    --yellow:#d97706;
    --text:#1a1a2e;
    --text-muted:#6b6b8a;
    --text-dim:#b0b0c8;
    --shadow:0 2px 12px rgba(242,110,255,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif;}
  body{background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

  .wrapper{max-width:1200px;margin:0 auto;padding:24px 32px;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:22px;border-bottom:2px solid var(--border);}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(242,110,255,0.3);flex-shrink:0;overflow:hidden;}
  .brand-name{font-size:26px;font-weight:900;letter-spacing:3px;color:var(--text);}
  .brand-sub{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .clock{font-size:22px;font-weight:800;letter-spacing:2px;color:var(--accent);background:var(--surface);border:2px solid var(--accent);padding:7px 18px;border-radius:10px;}
  .conn-pill{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .conn-pill .dot{width:8px;height:8px;border-radius:50%;}
  .conn-pill.wait{background:#fffbeb;color:var(--yellow);border:1.5px solid #fcd34d;}
  .conn-pill.wait .dot{background:var(--yellow);animation:pulse 1.2s infinite;}
  .conn-pill.ok{background:var(--green-bg);color:var(--green);border:1.5px solid #6ee7b7;}
  .conn-pill.ok .dot{background:var(--green);}
  .conn-pill.err{background:#fef2f2;color:var(--red);border:1.5px solid #fca5a5;}
  .conn-pill.err .dot{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* TABS */
  .tabs{display:flex;gap:8px;margin-bottom:24px;}
  .tab{padding:11px 26px;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--text-muted);border-radius:10px;transition:all 0.2s;box-shadow:var(--shadow);}
  .tab:hover{border-color:var(--accent);color:var(--accent);}
  .tab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 4px 20px var(--accent-glow);}

  .sec{display:none;}.sec.on{display:block;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ALERT */
  .alert{font-size:14px;font-weight:600;padding:12px 18px;border-radius:10px;margin-bottom:16px;display:none;text-align:center;}
  .alert.ok{background:var(--green-bg);color:var(--green);border:1.5px solid #6ee7b7;}
  .alert.err{background:#fef2f2;color:var(--red);border:1.5px solid #fca5a5;}
  .alert.inf{background:#eff6ff;color:#3b82f6;border:1.5px solid #93c5fd;}

  /* CARD */
  .card{background:#f2f2f5;border:2.5px solid #f26eff;border-radius:16px;padding:24px;margin-bottom:18px;box-shadow:0 0 16px 4px rgba(242,110,255,0.6),0 0 48px 12px rgba(242,110,255,0.25),inset 0 0 0 1px rgba(242,110,255,0.15);}
  .card-title{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:20px;text-align:center;display:flex;align-items:center;justify-content:center;gap:10px;}
  .card-title::before,.card-title::after{content:'';flex:1;height:1.5px;background:rgba(242,110,255,0.3);}

  /* FORM */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:2fr 0.6fr 1.4fr;gap:16px;}
  .fg{display:flex;flex-direction:column;gap:7px;}
  .fg.full{grid-column:1/-1;}
  label{font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#f26eff;text-align:center;}
  input[type=date],input[type=number],input[type=text],select,textarea{
    padding:11px 14px;background:#ffffff;border:1.5px solid rgba(242,110,255,0.35);
    border-radius:10px;font-size:14px;font-weight:500;color:var(--text);
    font-family:'Montserrat',sans-serif;width:100%;transition:border-color 0.2s,box-shadow 0.2s;text-align:center;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
  select option{background:#fff;}
  textarea{resize:vertical;min-height:80px;text-align:center;}

  .card-plain{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px;box-shadow:var(--shadow);}
  .card-plain .card-title::before,.card-plain .card-title::after{content:'';flex:1;height:1.5px;background:var(--border);}
  .select-a1{color:#60a5fa!important;font-weight:700!important;}
  .select-b1{color:#fb923c!important;font-weight:700!important;}
  .select-c1{color:#fbbf24!important;font-weight:700!important;}
  .select-d1{color:#f87171!important;font-weight:700!important;}
  .field-err.show{display:block;}
  .input-err input,.input-err select{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(220,38,38,0.15)!important;}
  .search-wrap{position:relative;}
  .search-wrap input{padding-right:36px;text-align:center;}
  .clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:15px;padding:2px 4px;}
  .clear-btn:hover{color:var(--text);}
  .dropdown-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--accent);border-radius:10px;max-height:220px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(242,110,255,0.12);}
  .dropdown-list.open{display:block;}
  .dropdown-item{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);transition:background 0.15s;text-align:left;}
  .dropdown-item:hover{background:#f0f0ff;color:var(--accent);}
  .dropdown-item mark{background:none;color:var(--accent);font-weight:700;}

  /* BUTTONS */
  .acts{display:flex;gap:10px;justify-content:center;margin-top:20px;}
  .btn{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:2px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all 0.2s;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;box-shadow:0 4px 16px var(--accent-glow);}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
  .btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;box-shadow:0 4px 12px rgba(16,185,129,0.2);}
  .btn-green:hover{opacity:0.9;transform:translateY(-1px);}

  /* FILTERS */
  .filters{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:0;position:sticky;top:0;z-index:20;background:var(--bg);padding:12px 0;border-bottom:1.5px solid var(--border);}
  .filters .btn-green{margin-left:auto;}
  thead{position:sticky;top:0;z-index:9;}
  thead th{position:sticky;top:55px;z-index:10;}
  .filters input[type=text],.filters input[type=date]{max-width:200px;width:auto;padding:10px 14px;font-size:14px;font-weight:600;text-align:left;}

  /* TABLE — full width, no scroll */
  .table-wrap{border-radius:12px;overflow:visible;border:1.5px solid var(--border);width:100%;box-shadow:var(--shadow);}
  table{width:100%;border-collapse:collapse;table-layout:auto;}
  .col-note-libere{width:180px;min-width:180px;max-width:180px;}
  tbody td.td-note-lib{width:180px;min-width:180px;max-width:180px;white-space:normal;word-break:break-word;font-size:13px;text-align:center;font-weight:500;}
  thead th{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    padding:11px 6px;text-align:center;
    font-size:11px;font-weight:800;letter-spacing:0.5px;
    color:#fff;text-transform:uppercase;
    border-bottom:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  thead th.th-note{background:rgba(242,110,255,0.85);}
  thead th.th-note-a1{background:#97fdff;color:#000;font-size:15px;vertical-align:top;width:60px;text-align:center;padding-top:10px;}
  thead th.th-note-b1{background:#ffc572;color:#000;font-size:15px;vertical-align:top;width:60px;text-align:center;padding-top:10px;}
  thead th.th-note-c1{background:#feff93;color:#000;font-size:15px;vertical-align:top;width:60px;text-align:center;padding-top:10px;}
  thead th.th-note-d1{background:#ff5e5e;color:#fff;font-size:15px;vertical-align:top;width:60px;text-align:center;padding-top:10px;}
  thead th{vertical-align:middle;}
  thead th.th-tot{background:#86efac;color:#1a1a2e;vertical-align:middle;}
  .th-sub{font-size:10px;font-weight:600;color:inherit;display:block;margin-top:3px;text-transform:none;letter-spacing:0;white-space:normal;line-height:1.3;text-align:center;}
  .td-a1{color:#97fdff;font-weight:700;}
  .td-b1{color:#ffc572;font-weight:700;}
  .td-c1{color:#feff93;font-weight:700;}
  .td-d1{color:#ff5e5e;font-weight:700;}
  .td-tot{font-weight:800;color:#1a1a2e;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;background:#86efac;color:#1a1a2e;}
  /* pie chart layout */
  .rep-layout{display:grid;grid-template-columns:1fr 240px;gap:16px;align-items:start;}
  .pie-card{background:var(--surface);border:2px solid #f26eff;border-radius:16px;padding:20px;text-align:center;position:sticky;top:16px;box-shadow:0 0 16px 4px rgba(242,110,255,0.5),0 0 48px 12px rgba(242,110,255,0.2);}
  .pie-legend{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
  .pie-leg-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;}
  .pie-leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;margin-right:8px;}
  .pie-leg-label{display:flex;align-items:center;flex:1;}
  tbody td{padding:10px 6px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-weight:500;font-size:13px;white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:nth-child(even){background:#f8f8fd;}
  tbody tr:hover{background:#eeeeff;}
  .td-zero{color:var(--text-dim);}
  .empty{text-align:center;padding:48px;color:var(--text-muted);font-size:15px;font-weight:600;}
  .ins-layout{display:grid;grid-template-columns:0.8fr 1.2fr;gap:24px;align-items:stretch;}
  .ins-left{display:flex;flex-direction:column;gap:14px;}
  .ins-right{background:#ffffff;border:1.5px solid rgba(242,110,255,0.2);border-radius:12px;padding:18px;display:flex;flex-direction:column;}
  .note-row{display:grid;grid-template-columns:36px 1fr 100px;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:8px;}
  .note-row:last-child{margin-bottom:0;}
  .note-label{font-size:15px;font-weight:800;letter-spacing:1px;text-align:center;}
  .note-desc{font-size:14px;font-weight:600;color:var(--text-muted);line-height:1.3;}
  .note-qty{width:100%;text-align:center;font-size:15px;font-weight:700;padding:8px 6px;}
  #s-ins{max-width:800px;margin:0 auto;}
  #s-rep,#s-sto{width:100vw;position:relative;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;padding:0 40px;}
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="brand">
      <div class="brand-icon">
        <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGRlZnM+CiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6I2YyNmVmZiIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiNkNDAwZTgiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgPC9kZWZzPgogIDxyZWN0IHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiByeD0iOTYiIGZpbGw9InVybCgjYmcpIi8+CiAgPHJlY3QgeD0iMTI4IiB5PSIyNDgiIHdpZHRoPSIyNTYiIGhlaWdodD0iMTg0IiByeD0iMjgiIGZpbGw9IndoaXRlIi8+CiAgPHBhdGggZD0iTTE2OCAyNDggVjE4MCBDMTY4IDEwOCAzNDQgMTA4IDM0NCAxODAgVjI0OCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI0MCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBmaWxsPSJub25lIi8+CiAgPGNpcmNsZSBjeD0iMjU2IiBjeT0iMzMwIiByPSIzMiIgZmlsbD0iI2YyNmVmZiIvPgogIDxyZWN0IHg9IjI0MCIgeT0iMzQ2IiB3aWR0aD0iMzIiIGhlaWdodD0iMzYiIHJ4PSI4IiBmaWxsPSIjZjI2ZWZmIi8+Cjwvc3ZnPgo=" width="42" height="42" style="display:block"/>
      </div>
      <div>
        <div class="brand-name"><span style="text-transform:uppercase">Caveau</span> (Valentano)</div>
        <div class="brand-sub">Gestione Prodotto Finito</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clk">--:--</div>
      <div class="conn-pill wait" id="conn"><span class="dot"></span><span id="conn-txt">Connessione...</span></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab on" onclick="show('ins')">Inserimento</button>
    <button class="tab" onclick="show('rep')">Riepilogo</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- INSERIMENTO -->
  <div id="s-ins" class="sec on">
    <div class="card">
      <div class="card-title">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="11" width="18" height="11" rx="2" fill="#f26eff" opacity="0.9"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#f26eff" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <circle cx="12" cy="16.5" r="1.8" fill="white"/>
        </svg>
      </div>

      <div class="ins-layout">
        <!-- Colonna sinistra: Data, Reparto, Articolo, Note -->
        <div class="ins-left">
          <div class="fg" style="margin-bottom:14px">
            <label>Data <span style="color:var(--red)">*</span></label>
            <input type="date" id="fdata"/>
            <span class="field-err" id="err-data"></span>
          </div>
          <div class="fg" style="margin-bottom:14px">
            <label>Reparto <span style="color:var(--red)">*</span></label>
            <div class="search-wrap">
              <input type="text" id="frep-txt" placeholder="Cerca reparto..." autocomplete="off"
                oninput="filterDrop('rep')" onfocus="openDrop('rep')" onblur="blurDrop('rep')"/>
              <button class="clear-btn" onmousedown="clearSrch('rep')">✕</button>
              <div class="dropdown-list" id="drop-rep"></div>
            </div>
            <input type="hidden" id="frep"/>
            <span class="field-err" id="err-rep"></span>
          </div>
          <div class="fg" style="margin-bottom:14px">
            <label>Articolo <span style="color:var(--red)">*</span></label>
            <div class="search-wrap">
              <input type="text" id="fart-txt" placeholder="Cerca articolo..." autocomplete="off" style="text-align:center;"
                oninput="filterDrop('art')" onfocus="openDrop('art')" onblur="blurDrop('art')"/>
              <button class="clear-btn" onmousedown="clearSrch('art')">✕</button>
              <div class="dropdown-list" id="drop-art"></div>
            </div>
            <input type="hidden" id="fart"/>
            <div id="art-info" style="display:none;margin-top:6px;padding:10px 14px;border-radius:8px;background:#fff;border:1.5px solid rgba(242,110,255,0.3);text-align:center;">
              <div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#f26eff;margin-bottom:3px;">Descrizione</div>
              <div id="art-desc" style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;"></div>
              <div id="art-coll-wrap" style="display:none;">
                <div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#f26eff;margin-bottom:3px;">Collezione</div>
                <div id="art-coll" style="font-size:13px;font-weight:700;color:#e91e8c;"></div>
              </div>
            </div>
            <span class="field-err" id="err-art"></span>
          </div>
        </div>

        <!-- Colonna destra: Cluster Caveau + Note -->
        <div class="ins-right">
          <label style="display:block;margin-bottom:12px;color:#f26eff;">Cluster Caveau <span style="color:var(--red)">*</span></label>
          <div id="note-rows"></div>
          <span class="field-err" id="err-note"></span>
          <div class="fg" style="margin-top:14px;">
            <label style="color:#f26eff;">Note</label>
            <textarea id="fnlib" placeholder="Note aggiuntive..." style="min-height:60px;"></textarea>
          </div>
        </div>
      </div>

      <div class="acts" style="margin-top:20px">
        <button class="btn" onclick="resetF()" style="background:#fbbf24;color:#1a1a2e;border-color:#fbbf24;font-weight:800;">✕ Pulisci</button>
        <button class="btn btn-primary" onclick="salva()">✓ Salva Movimento</button>
      </div>
    </div>
  </div>

  <!-- RIEPILOGO — tabella + torta -->
  <div id="s-rep" class="sec">
    <div class="card-plain">
      <div class="filters">
        <input type="text" id="r-rep" placeholder="Linea..." oninput="filtra()"/>
        <input type="text" id="r-art" placeholder="Desc. articolo..." oninput="filtra()"/>
        <input type="text" id="r-cluster" placeholder="Cluster caveau..." oninput="filtra()"/>
        <div class="search-wrap" style="max-width:160px;min-width:140px;z-index:30;">
          <input type="text" id="r-data-txt" placeholder="Data..." autocomplete="off"
            oninput="filterDataDrop()" onfocus="openDataDrop()" onblur="blurDataDrop()" style="text-align:left;padding-right:30px;"/>

          <div id="bar-card" style="background:var(--surface);border:2px solid #f26eff;border-radius:16px;padding:20px;box-shadow:0 0 16px 4px rgba(242,110,255,0.5),0 0 48px 12px rgba(242,110,255,0.2);">
            <div id="bar-chart" style="max-height:400px;overflow-y:auto;"><div style="color:var(--text-muted);font-size:12px;text-align:center;">Caricamento...</div></div>

</div>
<script>
var BASE='https://script.google.com/macros/s/AKfycbwL76P1I0Ib9gxfYTYojbyWJQwudEjtwovuSewVL_7a-oJFekDRQKSeYA0EdD11PosBLQ/exec';
var NOTE_COLORS={'A1':'#97fdff','B1':'#ffc572','C1':'#feff93','D1':'#ff5e5e'};
var NOTE_DEFAULT='#f26eff';
var tid=0,allRows=[],rHeaders=[],noteDescMap={},artDescMap={},artCollMap={},dropData={art:[],rep:[]};

// Clock
setInterval(function(){
  var n=new Date();
  document.getElementById('clk').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
},1000);

// Data locale CORRETTA
function todayLocal(){
  var n=new Date();
  return n.getFullYear()+'-'+(n.getMonth()+1).toString().padStart(2,'0')+'-'+n.getDate().toString().padStart(2,'0');
}

// Data già formattata GG/MM/AAAA dallo script — passthrough
function formatDate(v){
  if(!v&&v!==0)return'';
  var s=String(v);
  // Già GG/MM/AAAA
  if(s.match(/^\d{2}\/\d{2}\/\d{4}/))return s.slice(0,10);
  // ISO con T (fallback)
  if(s.indexOf('T')>0){
    var d=new Date(s);
    var local=new Date(d.getTime()-d.getTimezoneOffset()*60000);
    var p=local.toISOString().slice(0,10).split('-');
    return p[2]+'/'+p[1]+'/'+p[0];
  }
  // ISO AAAA-MM-GG (fallback)
  var p=s.slice(0,10).split('-');
  if(p.length===3&&p[0].length===4)return p[2].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+p[0];
  return s.slice(0,10);
}

// Converte GG/MM/AAAA → AAAA-MM-GG per confronti
function toISO(d){
  var p=d.split('/');
  return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d;
}

document.getElementById('fdata').value=todayLocal();

function setConn(s,t){var e=document.getElementById('conn');e.className='conn-pill '+s;document.getElementById('conn-txt').textContent=t;}

function gp(action,params,cb){
  var fn='_cb'+(tid++);
  var el=document.createElement('script');
  var q=new URLSearchParams(Object.assign({action:action,callback:fn,t:Date.now()},params||{})).toString();
  el.src=BASE+'?'+q;
  window[fn]=function(d){delete window[fn];el.remove();cb(d);};
  el.onerror=function(){delete window[fn];el.remove();cb({ok:false,error:'Script error'});};
  document.head.appendChild(el);
}

function hdr(d){
  if(!d||!d.length)return false;
  return['codice','id','nome','descrizione','reparto','articolo','nota','tipologia','note','data']
    .indexOf(String(d[0][0]||'').toLowerCase())>=0;
}

// DROPDOWN
function buildDrop(type,data,skip){
  dropData[type]=[];
  for(var i=skip?1:0;i<data.length;i++){
    if(!data[i][0])continue;
    var nome=String(data[i][0]);
    var desc='',coll='';
    if(type==='rep'){
      var linea=data[i][1]?String(data[i][1]):'';
      desc=data[i][2]?String(data[i][2]):'';
      dropData[type].push({val:nome,label:desc?nome+' — '+desc:nome,linea:linea,ubicazione:desc});
    } else {
      desc=data[i][1]?String(data[i][1]):'';
      coll=data[i][2]?String(data[i][2]):'';
      artDescMap[nome]=desc;
      artCollMap[nome]=coll;
      var label=desc?nome+' — '+desc:nome;
      dropData[type].push({val:nome,label:label,coll:coll});
    }
  }
}
function filterDrop(type){
  if(_selecting)return;
  var txt=document.getElementById('f'+type+'-txt').value.toLowerCase();
  var list=document.getElementById('drop-'+type);
  var items=dropData[type].filter(function(d){return d.label.toLowerCase().indexOf(txt)>=0;});
  list.innerHTML=items.length?items.map(function(d){
    var safe=txt.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    var desc=artDescMap[d.val]||'';
    var baseText=d.val+(desc?' — '+desc:'');
    var hlText=safe?baseText.replace(new RegExp('('+safe+')','gi'),'<mark>$1</mark>'):baseText;
    var coll=(type==='art'&&d.coll&&d.coll.trim())?'<span style="color:#e91e8c;font-weight:700;"> ['+d.coll+']</span>':'';
    return '<div class="dropdown-item" onmousedown="selectDrop(\''+type+'\',\''+d.val.replace(/\\/g,'\\\\').replace(/'/g,'\\\'')+'\')">'+hlText+coll+'</div>';
  }).join(''):'<div class="dropdown-item" style="color:var(--text-dim)">Nessun risultato</div>';
  list.classList.add('open');
}
var _selecting=false;
function openDrop(type){filterDrop(type);}
function blurDrop(type){setTimeout(function(){document.getElementById('drop-'+type).classList.remove('open');},150);}
function selectDrop(type,val){
  _selecting=true;
  var desc=artDescMap[val]||'';
  var coll=artCollMap[val]||'';
  // Mostra solo il codice nel campo testo
  var displayTxt=val;
  document.getElementById('f'+type+'-txt').value=displayTxt;
  document.getElementById('f'+type).value=val;
  document.getElementById('drop-'+type).classList.remove('open');
  // Se articolo, mostra card info
  if(type==='art'){
    var info=document.getElementById('art-info');
    var descEl=document.getElementById('art-desc');
    var collEl=document.getElementById('art-coll');
    var collWrap=document.getElementById('art-coll-wrap');
    if(desc||coll){
      info.style.display='block';
      descEl.textContent=desc||'—';
      if(coll&&coll.trim()){collEl.textContent=coll;collWrap.style.display='block';}
      else{collWrap.style.display='none';}
    } else {
      info.style.display='none';
    }
  }
  setTimeout(function(){_selecting=false;},200);
}

function renderPie(rows){
  var canvas=document.getElementById('pieChart');
  var legend=document.getElementById('pie-legend');
  if(!canvas)return;
  var ni=getNoteIndices();
  if(!ni.length){return;}
  var totals={};
  ni.forEach(function(i){totals[rHeaders[i]]=0;});
  rows.forEach(function(r){ni.forEach(function(i){totals[rHeaders[i]]+=(parseFloat(r[i])||0);});});
  var keys=Object.keys(totals).filter(function(k){return totals[k]>0;});
  // Totale = somma delle sole colonne nota
  var total=keys.reduce(function(s,k){return s+totals[k];},0);
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!total){
    ctx.fillStyle='#e8e8f0';ctx.beginPath();ctx.arc(100,100,90,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(100,100,44,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    legend.innerHTML='<div style="font-size:12px;color:var(--text-muted);text-align:center">Nessun dato</div>';
    return;
  }
  var startAngle=-Math.PI/2,cx=100,cy=100,r=90;
  keys.forEach(function(k){
    var slice=(totals[k]/total)*Math.PI*2;
    var col=getNoteColor(k);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startAngle,startAngle+slice);
    ctx.closePath();ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    var mid=startAngle+slice/2,pct=Math.round((totals[k]/total)*100);
    if(pct>5){
      // no label inside slice
    }
    startAngle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,44,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.font='bold 18px Montserrat,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(total,cx,cy-8);
  // Disegna lucchetto fucsia sotto il numero
  var img=new Image();
  img.src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" fill="%23f26eff"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="%23f26eff" stroke-width="2.2" stroke-linecap="round" fill="none"/><circle cx="12" cy="16.5" r="1.8" fill="white"/></svg>';
  img.onload=function(){ctx.drawImage(img,cx-12,cy+4,24,24);};
  // Tabella sotto
  legend.innerHTML='<table style="width:100%;border-collapse:collapse;margin-top:14px;font-size:13px;">'+
    '<thead><tr>'+
    keys.map(function(k){
      var col=getNoteColor(k);
      var fg=k==='D1'?'#fff':'#000';
      return '<th style="background:'+col+';color:'+fg+';padding:6px 10px;font-weight:800;border-radius:0;">'+k+'</th>';
    }).join('')+
    '</tr></thead>'+
    '<tbody><tr>'+
    keys.map(function(k){
      var col=getNoteColor(k);
      var fg=k==='D1'?'#fff':'#000';
      return '<td style="text-align:center;padding:8px 10px;font-weight:800;color:'+fg+';background:'+col+';border-bottom:1px solid #e0e0ec;">'+totals[k]+'</td>';
    }).join('')+
    '</tr></tbody></table>';
}

function renderBarChart(rows){
  try{
    var barDiv=document.getElementById('bar-chart');
    if(!barDiv)return;
    var artIdx=rHeaders.indexOf('Articolo');
    var totIdx=rHeaders.indexOf('Totale');
    if(artIdx<0||totIdx<0){
      barDiv.innerHTML='<div style="color:var(--text-muted);font-size:12px;text-align:center;">—</div>';
      return;
    }
    var artTotals={};
    rows.forEach(function(r){
      var cod=String(r[artIdx]||'').trim();
      var tot=parseFloat(r[totIdx])||0;
      if(!cod||tot<=0)return;
      artTotals[cod]=(artTotals[cod]||0)+tot;
    });
    var entries=Object.keys(artTotals)
      .map(function(k){return{cod:k,tot:artTotals[k]};})
      .sort(function(a,b){return b.tot-a.tot;});
    if(!entries.length){
      barDiv.innerHTML='<div style="color:var(--text-muted);font-size:12px;text-align:center;">Nessun dato</div>';
      return;
    }
    barDiv.innerHTML=entries.map(function(e){
      var desc=artDescMap[e.cod]||'';
      var coll=artCollMap[e.cod]||'';
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid var(--border);">'+
        '<div style="flex:1;min-width:0;padding-right:6px;">'+
          '<div style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+e.cod+'</div>'+
          (desc?'<div style="font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+desc+'</div>':'')+
          (coll?'<div style="font-size:10px;color:#e91e8c;font-weight:700;">'+coll+'</div>':'')+
        '</div>'+
        '<span style="background:#f26eff;color:#fff;font-size:12px;font-weight:800;padding:2px 8px;border-radius:20px;flex-shrink:0;">'+e.tot+'</span>'+
      '</div>';
    }).join('');
  }catch(err){console.error('renderBarChart:',err);}
}
function clearErrors(){
  ['data','rep','art','note'].forEach(function(f){
    var el=document.getElementById('err-'+f);
    if(el){el.textContent='';el.classList.remove('show');}
    var fg=el?el.parentElement:null;
    if(fg)fg.classList.remove('input-err');
  });
}

function setError(field, msg){
  var el=document.getElementById('err-'+field);
  if(el){el.textContent=msg;el.classList.add('show');}
  var fg=el?el.parentElement:null;
  if(fg)fg.classList.add('input-err');
}

function salva(){
  clearErrors();
  var data=document.getElementById('fdata').value;
  var rep=document.getElementById('frep').value;
  var art=document.getElementById('fart').value;
  var nlib=document.getElementById('fnlib').value;

  if(!rep){
    var txt=document.getElementById('frep-txt').value.trim();
    var found=dropData['rep'].find(function(d){return d.label===txt||d.val===txt;});
    if(found) rep=found.val;
    else rep=txt;
    document.getElementById('frep').value=rep;
  }

  var ok=true;
  if(!data){setError('data','Inserisci la data');ok=false;}
  if(!rep){setError('rep','Seleziona un reparto');ok=false;}
  if(!art){setError('art','Seleziona un articolo');ok=false;}

  var noteEntries=[];
  Object.keys(noteDescMap).forEach(function(cod){
    var el=document.getElementById('qty-'+cod);
    if(el){var v=parseFloat(el.value)||0;if(v>0)noteEntries.push(cod+':'+v);}
  });
  if(noteEntries.length===0){setError('note','Inserisci almeno una quantità');ok=false;}
  if(!ok)return;

  // Recupera linea e ubicazione dal dropdown (già in memoria)
  var repItem=dropData['rep'].find(function(d){return d.val===rep;});
  var linea=repItem?repItem.linea||'':'';
  var ubicazione=repItem?repItem.ubicazione||'':'';

  gp('write',{
    data:data,
    reparto:rep,
    linea:linea,
    ubicazione:ubicazione,
    articolo:art,
    note:noteEntries.join(','),
    note_libere:nlib,
    headers:rHeaders.join(','),
    foglio:'Riepilogo'
  },function(r){
    if(r.ok){showAlert('✓ Movimento salvato!','ok');resetF();setTimeout(loadR,1500);}
    else{showAlert('Errore: '+(r.error||'sconosciuto'),'err');}
  });
}
function clearSrch(type){
  document.getElementById('f'+type+'-txt').value='';
  document.getElementById('f'+type).value='';
  document.getElementById('drop-'+type).classList.remove('open');
  if(type==='art'){
    var info=document.getElementById('art-info');
    if(info)info.style.display='none';
    var cw=document.getElementById('art-coll-wrap');
    if(cw)cw.style.display='none';
  }
}

// NOTE SELECT
function colorNote(sel){
  sel.className='';
  var v=sel.value.toUpperCase();
  if(v==='A1')sel.className='select-a1';
  else if(v==='B1')sel.className='select-b1';
  else if(v==='C1')sel.className='select-c1';
  else if(v==='D1')sel.className='select-d1';
}

function fillNote(data,skip){
  noteDescMap={};
  var noteList=[];
  for(var i=skip?1:0;i<data.length;i++){
    if(!data[i][0])continue;
    var cod=String(data[i][0]),desc=data[i][1]?String(data[i][1]):'';
    noteDescMap[cod]=desc;
    noteList.push({cod:cod,desc:desc});
  }
  // Costruisci righe visibili con casella qty
  var container=document.getElementById('note-rows');
  if(!container)return;
var NOTE_COLORS_DARK={'A1':'#00c8cc','B1':'#e07800','C1':'#c8c800','D1':'#cc1a1a'};
var NOTE_COLORS_BG={'A1':'#97fdff','B1':'#ffc572','C1':'#e8d800','D1':'#ff5e5e'};
  container.innerHTML=noteList.map(function(n){
    var col=NOTE_COLORS_BG[n.cod.toUpperCase()]||getNoteColor(n.cod);
    var colDark=NOTE_COLORS_DARK[n.cod.toUpperCase()]||col;
    return '<div class="note-row" style="background:'+col+'33;border:1.5px solid '+col+';">'+
      '<span class="note-label" style="color:'+colDark+'">'+n.cod+'</span>'+
      '<span class="note-desc" style="color:'+colDark+'">'+n.desc+'</span>'+
      '<input type="number" class="note-qty" id="qty-'+n.cod+'" min="0" placeholder="0" style="border:1.5px solid '+col+';color:'+colDark+';font-weight:800;"/>'+
      '</div>';
  }).join('');
}

// INIT
function init(){
  setConn('wait','Connessione...');
  gp('init',{},function(d){
    if(!d.ok){setConn('err','Errore');showAlert('Errore connessione: '+(d.error||''),'err');return;}
    buildDrop('art',d.articoli||[],hdr(d.articoli||[]));
    buildDrop('rep',d.reparti||[],hdr(d.reparti||[]));
    fillNote(d.cluster||[],hdr(d.cluster||[]));
    setConn('ok','Connesso');
    loadR();
  });
}

// RIEPILOGO
function getLastDate(rows){
  var last='';
  rows.forEach(function(r){
    var d=toISO(formatDate(r[0]));
    if(d>last)last=d;
  });
  return last;
}

function loadR(){
  document.getElementById('tb').innerHTML='<tr><td class="empty">Caricamento...</td></tr>';
  function doRender(d){
    if(!d.ok){document.getElementById('tb').innerHTML='<tr><td class="empty">Errore: '+(d.error||'')+'</td></tr>';return;}
    rHeaders=d.headers||[];
    allRows=(d.rows||[]).filter(function(r){return r[0];});
    renderHead();
    buildDateDrop();
    filtra();
  }
  if(Object.keys(artDescMap).length===0){
    gp('read',{sheet:'Articoli'},function(da){
      buildDrop('art',da.data||[],hdr(da.data||[]));
      gp('read_riepilogo',{},doRender);
    });
  } else {
    gp('read_riepilogo',{},doRender);
  }
}

var HIDDEN=['note','codice','notes'];
var NOTE_LIBERE_COL='note libere';
function isHidden(col){return HIDDEN.indexOf(col.toLowerCase())>=0;}
function isNoteLibere(col){return col.toLowerCase()===NOTE_LIBERE_COL;}

function getNoteIndices(){
  var r=[];
  // Note columns start after Articolo and before Totale
  var artIdx=rHeaders.indexOf('Articolo');
  var start=artIdx>=0?artIdx+1:4;
  for(var i=start;i<rHeaders.length;i++){
    if(rHeaders[i]==='Totale')break;
    if(!isHidden(rHeaders[i]))r.push(i);
  }
  return r;
}

var dateList=[];
var selectedDate='';

function buildDateDrop(){
  var dates={};
  allRows.forEach(function(r){
    var d=formatDate(r[0]);
    if(d)dates[d]=1;
  });
  dateList=Object.keys(dates).sort(function(a,b){
    return toISO(b).localeCompare(toISO(a)); // più recente prima
  });
}

function filterDataDrop(){
  var txt=document.getElementById('r-data-txt').value.toLowerCase();
  var list=document.getElementById('drop-data');
  var items=dateList.filter(function(d){return d.indexOf(txt)>=0;});
  list.innerHTML=items.length
    ?items.map(function(d){
      var safe=txt.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      var hl=safe?d.replace(new RegExp('('+safe+')','gi'),'<mark>$1</mark>'):d;
      return '<div class="dropdown-item" onmousedown="selectData(\''+d+'\')">'+hl+'</div>';
    }).join('')
    :'<div class="dropdown-item" style="color:var(--text-dim)">Nessuna data</div>';
  list.classList.add('open');
}

function openDataDrop(){filterDataDrop();}
function blurDataDrop(){setTimeout(function(){document.getElementById('drop-data').classList.remove('open');},150);}

function selectData(d){
  selectedDate=d;
  document.getElementById('r-data-txt').value=d;
  document.getElementById('drop-data').classList.remove('open');
  filtra();
}

function clearDataFiltro(){
  selectedDate='';
  document.getElementById('r-data-txt').value='';
  document.getElementById('drop-data').classList.remove('open');
  filtra();
}
function getNoteColor(cod){return NOTE_COLORS[cod.toUpperCase()]||NOTE_DEFAULT;}
function getNoteThClass(cod){
  var u=cod.toUpperCase();
  if(u==='A1')return'th-note-a1';
  if(u==='B1')return'th-note-b1';
  if(u==='C1')return'th-note-c1';
  if(u==='D1')return'th-note-d1';
  return'th-note';
}

function renderHead(){
  var ni=getNoteIndices();
  var h='<tr>';
  for(var i=0;i<rHeaders.length;i++){
    var col=rHeaders[i];
    if(isHidden(col))continue;
    if(col==='Totale'){h+='<th class="th-tot">Totale</th>';continue;}
    if(isNoteLibere(col)){h+='<th class="col-note-libere" style="background:linear-gradient(135deg,#f26eff,#d400e8);color:#fff;">Note Libere</th>';continue;}
    if(ni.indexOf(i)>=0){
      var desc=noteDescMap[col]||'';
      h+='<th class="'+getNoteThClass(col)+'">'+col+(desc?'<span class="th-sub">'+desc+'</span>':'')+'</th>';
    } else {
      h+='<th>'+col+'</th>';
    }
  }
  h+='</tr>';
  document.getElementById('tbl-head').innerHTML=h;
}

function filtra(){
  var rep=document.getElementById('r-rep').value.toLowerCase();
  var art=document.getElementById('r-art').value.toLowerCase();
  var cluster=document.getElementById('r-cluster').value.toLowerCase();
  var artIdx=rHeaders.indexOf('Articolo');
  var ni=getNoteIndices();

  var f=allRows.filter(function(r){
    if(rep){
      var lineaIdx=rHeaders.indexOf('Linea');
      var lineaVal=lineaIdx>=0?String(r[lineaIdx]||'').toLowerCase():'';
      var nomeVal=String(r[1]||'').toLowerCase();
      if(lineaVal.indexOf(rep)<0&&nomeVal.indexOf(rep)<0)return false;
    }
    if(art){
      var cod=String(r[artIdx>=0?artIdx:3]||'');
      var desc=(artDescMap[cod]||'').toLowerCase();
      if(desc.indexOf(art)<0&&cod.toLowerCase().indexOf(art)<0)return false;
    }
    if(cluster){
      var found=false;
      ni.forEach(function(i){
        var colName=rHeaders[i].toLowerCase();
        var qty=parseFloat(r[i])||0;
        if(colName.indexOf(cluster)>=0&&qty>0)found=true;
        var desc=(noteDescMap[rHeaders[i]]||'').toLowerCase();
        if(desc.indexOf(cluster)>=0&&qty>0)found=true;
      });
      if(!found)return false;
    }
    if(selectedDate){
      if(formatDate(r[0])!==selectedDate)return false;
    }
    return true;
  });

  // Grafici: usa data del filtro se presente, altrimenti ultima data
  var gDate=selectedDate||(dateList.length?dateList[0]:'');
  var fGrafici=allRows.filter(function(r){return formatDate(r[0])===gDate;});
  renderPie(fGrafici);
  renderBarChart(fGrafici);
  var tb=document.getElementById('tb');
  if(!f.length){
    tb.innerHTML='<tr><td colspan="'+rHeaders.filter(function(h){return!isHidden(h);}).length+'" class="empty">Nessun dato trovato</td></tr>';
    return;
  }
  var ni=getNoteIndices();
  var totIdx=rHeaders.indexOf('Totale');
  tb.innerHTML=f.map(function(r){
    var html='<tr>';
    for(var i=0;i<rHeaders.length;i++){
      var col=rHeaders[i];
      if(isHidden(col))continue;
      var val=r[i]!==undefined?r[i]:'';
      if(col==='Data'){html+='<td>'+formatDate(val)+'</td>';continue;}
      if(col==='Totale'){
        var tv=parseFloat(val)||0;
        html+='<td class="td-tot"><span class="badge">'+tv+'</span></td>';
        continue;
      }
      if(isNoteLibere(col)){html+='<td style="font-size:13px;text-align:center;font-weight:500;white-space:normal;word-break:break-word;">'+String(val||'')+'</td>';continue;}
      if(col==='Articolo'){
        var coll=artCollMap[String(val)]||'';
        var desc=artDescMap[String(val)]||'';
        html+='<td>'+String(val)+
          (desc?'<br><span style="color:var(--text-muted);font-size:11px;font-weight:600;">'+desc+'</span>':'')+
          (coll?'<br><span style="color:#e91e8c;font-size:11px;font-weight:700;">'+coll+'</span>':'')+'</td>';
        continue;
      }
      if(ni.indexOf(i)>=0){
        var n=parseFloat(val)||0;
        var u=col.toUpperCase();
        if(n===0){html+='<td class="td-zero">—</td>';}
        else{
          var bg=u==='A1'?'#97fdff':u==='B1'?'#ffc572':u==='C1'?'#feff93':u==='D1'?'#ff5e5e':'#f26eff';
          var fg=u==='D1'?'#fff':'#000';
          html+='<td><span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;background:'+bg+';color:'+fg+';">'+n+'</span></td>';
        }
        continue;
      }
      html+='<td>'+String(val)+'</td>';
    }
    html+='</tr>';
    return html;
  }).join('');
}

function resetF(){
  clearErrors();
  document.getElementById('fdata').value=todayLocal();
  clearSrch('rep');clearSrch('art');
  document.getElementById('fnlib').value='';
  Object.keys(noteDescMap).forEach(function(cod){
    var el=document.getElementById('qty-'+cod);
    if(el)el.value='';
  });
}

function showAlert(t,c){
  var e=document.getElementById('alert');
  e.textContent=t;e.className='alert '+c;e.style.display='block';
  setTimeout(function(){e.style.display='none';},5000);
}


function show(n){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('s-'+n).classList.add('on');
  document.querySelectorAll('.tab')[{ins:0,rep:1}[n]].classList.add('on');
  if(n==='rep')loadR();
}

// Auto-refresh ogni 5 minuti
setInterval(function(){
  gp('init',{},function(d){
    if(!d.ok)return;
    buildDrop('art',d.articoli||[],hdr(d.articoli||[]));
    buildDrop('rep',d.reparti||[],hdr(d.reparti||[]));
    fillNote(d.cluster||[],hdr(d.cluster||[]));
  });
  if(document.getElementById('s-rep').classList.contains('on')) loadR();
}, 5 * 60 * 1000);

init();
</script>
